                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#cccccc", "font": {"color": "white"}, "id": "identity--5df7e8d9-d5c2-392a-f67d-511811817c4a", "label": "SEQRITE Labs", "shape": "dot", "title": "{\n  \"type\": \"identity\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"identity--5df7e8d9-d5c2-392a-f67d-511811817c4a\",\n  \"created\": \"2026-01-19T21:46:24.295687Z\",\n  \"modified\": \"2026-01-19T21:46:24.295687Z\",\n  \"name\": \"SEQRITE Labs\",\n  \"description\": \"SEQRITE Labs is the publisher of this threat intelligence report. STIXed by TI Mindmap HUB.\",\n  \"identity_class\": \"organization\"\n}"}, {"color": "#cccccc", "font": {"color": "white"}, "id": "identity--fbd192cb-0ab2-33e3-92cc-c2456bf8d439", "label": "TI Mindmap HUB", "shape": "dot", "title": "{\n  \"type\": \"identity\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"identity--fbd192cb-0ab2-33e3-92cc-c2456bf8d439\",\n  \"created\": \"2026-01-19T21:46:24.295687Z\",\n  \"modified\": \"2026-01-19T21:46:24.295687Z\",\n  \"name\": \"TI Mindmap HUB\",\n  \"description\": \"TI Mindmap HUB is an AI-powered threat intelligence platform that generates STIX bundles from OSINT sources.\",\n  \"identity_class\": \"organization\"\n}"}, {"color": "#cccccc", "font": {"color": "white"}, "id": "marking-definition--94868c89-83c2-464b-929b-a1a8aa3c8487", "label": "TLP:CLEAR", "shape": "dot", "title": "{\n  \"type\": \"marking-definition\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"marking-definition--94868c89-83c2-464b-929b-a1a8aa3c8487\",\n  \"created\": \"2026-01-19T21:46:24.295687Z\",\n  \"definition_type\": \"tlp\",\n  \"name\": \"TLP:CLEAR\",\n  \"definition\": {\n    \"tlp\": \"clear\"\n  }\n}"}, {"color": "#ff4b5c", "font": {"color": "white"}, "id": "attack-pattern--50969ca5-1ce0-f880-e51e-b05982ca72e6", "label": "Spearphishing with G", "shape": "dot", "title": "{\n  \"type\": \"attack-pattern\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"attack-pattern--50969ca5-1ce0-f880-e51e-b05982ca72e6\",\n  \"created\": \"2026-01-19T21:46:45.774624Z\",\n  \"modified\": \"2026-01-19T21:46:45.774624Z\",\n  \"created_by_ref\": \"identity--5df7e8d9-d5c2-392a-f67d-511811817c4a\",\n  \"name\": \"Spearphishing with Government-Themed Decoy Document\",\n  \"description\": \"The threat actors crafted a highly convincing government-themed lure document written in Pashto, complete with official logos, formatting, reference numbers, and signatures. This decoy is distributed to Afghan government employees, specifically targeting ministries and administrative offices. The document creates urgency by setting deadlines and mimics authentic communication from the Prime Minister\\u00e2\\u20ac\\u2122s Office, aiming to trick recipients into opening the attached malicious files. The use of culturally and contextually relevant details increases the likelihood of successful initial compromise by leveraging trust in official communications.\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mitre-attack\",\n      \"phase_name\": \"initial-access\"\n    }\n  ],\n  \"external_references\": [\n    {\n      \"source_name\": \"mitre-attack\",\n      \"url\": \"https://attack.mitre.org/techniques/T1566/001/\",\n      \"external_id\": \"T1566.001\"\n    }\n  ]\n}"}, {"color": "#ff4b5c", "font": {"color": "white"}, "id": "attack-pattern--263ad44e-f792-e4c1-48f7-22e854ade5fd", "label": "Malicious ISO File f", "shape": "dot", "title": "{\n  \"type\": \"attack-pattern\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"attack-pattern--263ad44e-f792-e4c1-48f7-22e854ade5fd\",\n  \"created\": \"2026-01-19T21:46:45.774712Z\",\n  \"modified\": \"2026-01-19T21:46:45.774712Z\",\n  \"created_by_ref\": \"identity--5df7e8d9-d5c2-392a-f67d-511811817c4a\",\n  \"name\": \"Malicious ISO File for Payload Delivery and Mark-of-the-Web Evasion\",\n  \"description\": \"Attackers use an ISO file named to resemble an official Afghan government document as the initial container for malicious files. The ISO contains a decoy PDF, a shortcut (LNK) file, and the final payload disguised as an image file. By leveraging the ISO format, the attackers evade common email and endpoint security controls, as Windows mounts ISO files as virtual drives, which often prevents embedded files from inheriting Mark-of-the-Web restrictions. This increases the chance that the malicious content will execute without triggering security warnings or sandboxing.\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mitre-attack\",\n      \"phase_name\": \"initial-access\"\n    }\n  ],\n  \"external_references\": [\n    {\n      \"source_name\": \"mitre-attack\",\n      \"url\": \"https://attack.mitre.org/techniques/T1204/002/\",\n      \"external_id\": \"T1204.002\"\n    }\n  ]\n}"}, {"color": "#ff4b5c", "font": {"color": "white"}, "id": "attack-pattern--ef21ccbe-3bdc-72fd-14d2-1492aca8aa1d", "label": "Malicious LNK File f", "shape": "dot", "title": "{\n  \"type\": \"attack-pattern\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"attack-pattern--ef21ccbe-3bdc-72fd-14d2-1492aca8aa1d\",\n  \"created\": \"2026-01-19T21:46:45.774806Z\",\n  \"modified\": \"2026-01-19T21:46:45.774806Z\",\n  \"created_by_ref\": \"identity--5df7e8d9-d5c2-392a-f67d-511811817c4a\",\n  \"name\": \"Malicious LNK File for Decoy Display, Payload Execution, and Persistence\",\n  \"description\": \"The campaign uses a specially crafted LNK shortcut file named \u0027Doc.pdf.lnk\u0027 that, when executed, opens the decoy PDF to distract the victim while simultaneously copying the payload (FALSECUB) to the C:\\\\ProgramData directory. The LNK file then creates a hardlink in the Startup folder under the name \u0027searchmgr.exe\u0027 using the mklink command, ensuring the malware is executed upon system boot for persistence. Finally, it launches the payload using the start command. This multi-step process allows for stealthy execution and persistence while maintaining the appearance of legitimacy.\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mitre-attack\",\n      \"phase_name\": \"execution\"\n    }\n  ],\n  \"external_references\": [\n    {\n      \"source_name\": \"mitre-attack\",\n      \"url\": \"https://attack.mitre.org/techniques/T1218/007/\",\n      \"external_id\": \"T1218.007\"\n    }\n  ]\n}"}, {"color": "#ff4b5c", "font": {"color": "white"}, "id": "attack-pattern--a46b9ecc-e2b1-f551-c919-32f200f83765", "label": "Payload Masquerading", "shape": "dot", "title": "{\n  \"type\": \"attack-pattern\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"attack-pattern--a46b9ecc-e2b1-f551-c919-32f200f83765\",\n  \"created\": \"2026-01-19T21:46:45.774868Z\",\n  \"modified\": \"2026-01-19T21:46:45.774868Z\",\n  \"created_by_ref\": \"identity--5df7e8d9-d5c2-392a-f67d-511811817c4a\",\n  \"name\": \"Payload Masquerading as Image File\",\n  \"description\": \"The final payload, FALSECUB, is disguised with a .jpg extension (img.jpg) to appear as a harmless image file. This naming convention is intended to deceive both users and automated security controls, making it less likely for the executable to be flagged as suspicious. The masquerading technique is used throughout the infection chain, from initial delivery in the ISO file to execution, increasing the stealth of the operation and reducing the risk of detection during manual inspection or automated scanning.\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mitre-attack\",\n      \"phase_name\": \"defense-evasion\"\n    }\n  ],\n  \"external_references\": [\n    {\n      \"source_name\": \"mitre-attack\",\n      \"url\": \"https://attack.mitre.org/techniques/T1036/008/\",\n      \"external_id\": \"T1036.008\"\n    }\n  ]\n}"}, {"color": "#ff4b5c", "font": {"color": "white"}, "id": "attack-pattern--0712f37a-86a9-9e1e-fbbd-f1c9435d4747", "label": "Persistence via Hard", "shape": "dot", "title": "{\n  \"type\": \"attack-pattern\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"attack-pattern--0712f37a-86a9-9e1e-fbbd-f1c9435d4747\",\n  \"created\": \"2026-01-19T21:46:45.774976Z\",\n  \"modified\": \"2026-01-19T21:46:45.774976Z\",\n  \"created_by_ref\": \"identity--5df7e8d9-d5c2-392a-f67d-511811817c4a\",\n  \"name\": \"Persistence via Hardlink in Startup Folder\",\n  \"description\": \"After copying the payload to the ProgramData directory, the LNK file creates a hardlink to the payload in the Windows Startup folder using the mklink command. The hardlink is named \u0027searchmgr.exe\u0027, mimicking a legitimate system process. This ensures that the malware is executed every time the system boots, providing persistence across reboots. The use of a hardlink rather than a simple shortcut or registry modification is a less common method, potentially bypassing some security controls that monitor traditional persistence mechanisms.\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mitre-attack\",\n      \"phase_name\": \"persistence\"\n    }\n  ]\n}"}, {"color": "#ff4b5c", "font": {"color": "white"}, "id": "attack-pattern--76a1ccfa-0ced-79ea-a2fb-719aa5191bcb", "label": "Anti-Analysis Checks", "shape": "dot", "title": "{\n  \"type\": \"attack-pattern\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"attack-pattern--76a1ccfa-0ced-79ea-a2fb-719aa5191bcb\",\n  \"created\": \"2026-01-19T21:46:45.775028Z\",\n  \"modified\": \"2026-01-19T21:46:45.775028Z\",\n  \"created_by_ref\": \"identity--5df7e8d9-d5c2-392a-f67d-511811817c4a\",\n  \"name\": \"Anti-Analysis Checks Using System APIs\",\n  \"description\": \"The FALSECUB malware incorporates multiple anti-analysis techniques to evade detection and hinder reverse engineering. It uses APIs such as GetTickCount64 to detect if it is running in a debugger, GlobalMemoryStatusEx to check for low physical memory typical of analysis environments, and IsDebuggerPresent to directly determine if a debugger is attached. If any of these checks indicate an analysis environment, the malware employs Sleep APIs to delay execution or halt, making dynamic analysis more difficult and reducing the likelihood of successful sandboxing or automated detection.\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mitre-attack\",\n      \"phase_name\": \"defense-evasion\"\n    }\n  ],\n  \"external_references\": [\n    {\n      \"source_name\": \"mitre-attack\",\n      \"url\": \"https://attack.mitre.org/techniques/T1497/001/\",\n      \"external_id\": \"T1497.001\"\n    }\n  ]\n}"}, {"color": "#ff4b5c", "font": {"color": "white"}, "id": "attack-pattern--29113d9e-299e-9ce4-57be-6469be16c59b", "label": "Command and Control ", "shape": "dot", "title": "{\n  \"type\": \"attack-pattern\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"attack-pattern--29113d9e-299e-9ce4-57be-6469be16c59b\",\n  \"created\": \"2026-01-19T21:46:45.775077Z\",\n  \"modified\": \"2026-01-19T21:46:45.775077Z\",\n  \"created_by_ref\": \"identity--5df7e8d9-d5c2-392a-f67d-511811817c4a\",\n  \"name\": \"Command and Control via Embedded C2 Address\",\n  \"description\": \"Once the anti-analysis checks are passed, the FALSECUB implant connects to a command-and-control (C2) server using an embedded address in its code. This allows the threat actor to remotely control the infected machine, exfiltrate data, and potentially deliver additional payloads. The connection is established immediately after persistence is achieved, enabling ongoing communication and control over compromised systems within targeted Afghan government networks.\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mitre-attack\",\n      \"phase_name\": \"command-and-control\"\n    }\n  ],\n  \"external_references\": [\n    {\n      \"source_name\": \"mitre-attack\",\n      \"url\": \"https://attack.mitre.org/techniques/T1071/001/\",\n      \"external_id\": \"T1071.001\"\n    }\n  ]\n}"}, {"color": "#ff9f43", "font": {"color": "white"}, "id": "malware--835973ab-0257-9260-7968-93f90b13e03d", "label": "FALSECUB", "shape": "dot", "title": "{\n  \"type\": \"malware\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"malware--835973ab-0257-9260-7968-93f90b13e03d\",\n  \"created\": \"2026-01-19T21:46:49.705126Z\",\n  \"modified\": \"2026-01-19T21:46:49.705126Z\",\n  \"created_by_ref\": \"identity--5df7e8d9-d5c2-392a-f67d-511811817c4a\",\n  \"name\": \"FALSECUB\",\n  \"description\": \"FALSECUB is a C++ executable payload delivered via a malicious ISO and LNK file, disguised as an image file. It is used to establish persistence, evade analysis, and connect to a command-and-control server for remote access and further malicious activities.\",\n  \"malware_types\": [\n    \"backdoor\",\n    \"trojan\"\n  ],\n  \"is_family\": true,\n  \"x_capabilities\": [\n    \"persistence\",\n    \"anti-analysis\",\n    \"command-and-control\",\n    \"remote-access\"\n  ]\n}"}, {"color": "#cccccc", "font": {"color": "white"}, "id": "threat-actor--2c400e9d-96e9-40d9-4e39-36c7e9a10e92", "label": "Unidentified Afghan ", "shape": "dot", "title": "{\n  \"type\": \"threat-actor\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"threat-actor--2c400e9d-96e9-40d9-4e39-36c7e9a10e92\",\n  \"created\": \"2026-01-19T21:46:53.643674Z\",\n  \"modified\": \"2026-01-19T21:46:53.643674Z\",\n  \"created_by_ref\": \"identity--5df7e8d9-d5c2-392a-f67d-511811817c4a\",\n  \"name\": \"Unidentified Afghan Government Targeting Group\",\n  \"description\": \"This threat group is actively targeting Afghan government employees using a fake lure document that mimics official government correspondence. The group utilizes a multi-stage infection chain involving ISO, LNK, and a custom payload named FALSECUB, with operational security mistakes leading to some infrastructure exposure.\",\n  \"threat_actor_types\": [\n    \"unknown\"\n  ],\n  \"goals\": [\n    \"Compromise Afghan government sector organizations\",\n    \"Establish persistence on victim machines\",\n    \"Exfiltrate sensitive government information\"\n  ],\n  \"sophistication\": \"intermediate\",\n  \"primary_motivation\": \"espionage\"\n}"}, {"color": "#1dd1a1", "font": {"color": "white"}, "id": "tool--34837457-9cff-22c4-dcb9-03bd39bc1fd8", "label": "mklink", "shape": "dot", "title": "{\n  \"type\": \"tool\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"tool--34837457-9cff-22c4-dcb9-03bd39bc1fd8\",\n  \"created\": \"2026-01-19T21:47:05.707485Z\",\n  \"modified\": \"2026-01-19T21:47:05.707485Z\",\n  \"created_by_ref\": \"identity--5df7e8d9-d5c2-392a-f67d-511811817c4a\",\n  \"name\": \"mklink\",\n  \"description\": \"The mklink command is used by the malicious LNK file to create a hardlink in the Startup folder, enabling persistence by ensuring the malicious payload is executed whenever the system boots.\",\n  \"tool_types\": [\n    \"exploitation\",\n    \"persistence\"\n  ],\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mitre-attack\",\n      \"phase_name\": \"persistence\"\n    }\n  ]\n}"}, {"color": "#1dd1a1", "font": {"color": "white"}, "id": "tool--ea2b2676-c28c-0db2-6d39-331a336c6b92", "label": "start", "shape": "dot", "title": "{\n  \"type\": \"tool\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"tool--ea2b2676-c28c-0db2-6d39-331a336c6b92\",\n  \"created\": \"2026-01-19T21:47:05.707575Z\",\n  \"modified\": \"2026-01-19T21:47:05.707575Z\",\n  \"created_by_ref\": \"identity--5df7e8d9-d5c2-392a-f67d-511811817c4a\",\n  \"name\": \"start\",\n  \"description\": \"The start command is abused by the LNK file to execute the malicious implant after persistence is established, launching the payload in a way that mimics legitimate application execution.\",\n  \"tool_types\": [\n    \"execution\"\n  ],\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mitre-attack\",\n      \"phase_name\": \"execution\"\n    }\n  ]\n}"}, {"color": "#1dd1a1", "font": {"color": "white"}, "id": "tool--bb574d1f-4a2b-811e-2ca3-882adc77fe6a", "label": "Windows Shortcut (.L", "shape": "dot", "title": "{\n  \"type\": \"tool\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"tool--bb574d1f-4a2b-811e-2ca
