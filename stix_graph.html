                  nodes = new vis.DataSet([{"color": "#cccccc", "font": {"color": "black"}, "id": "identity--d4a47b7a-c415-30f2-52b9-59b8c0f64ab1", "label": "Jamf Threat Labs", "shape": "dot", "title": "{\n  \"type\": \"identity\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"identity--d4a47b7a-c415-30f2-52b9-59b8c0f64ab1\",\n  \"created\": \"2026-01-14T21:50:59.819822Z\",\n  \"modified\": \"2026-01-14T21:50:59.819822Z\",\n  \"name\": \"Jamf Threat Labs\",\n  \"description\": \"Jamf Threat Labs is the publisher of this threat intelligence report. STIXed by TI Mindmap HUB.\",\n  \"identity_class\": \"organization\"\n}"}, {"color": "#cccccc", "font": {"color": "black"}, "id": "identity--b3a6bc16-97d2-650e-ede8-d111bbdcb5d5", "label": "Shen Yuan and Nir Av", "shape": "dot", "title": "{\n  \"type\": \"identity\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"identity--b3a6bc16-97d2-650e-ede8-d111bbdcb5d5\",\n  \"created\": \"2026-01-14T21:50:59.819822Z\",\n  \"modified\": \"2026-01-14T21:50:59.819822Z\",\n  \"name\": \"Shen Yuan and Nir Avraham\",\n  \"description\": \"Shen Yuan and Nir Avraham is the primary author of this threat intelligence report. STIXed by TI Mindmap HUB.\",\n  \"identity_class\": \"individual\"\n}"}, {"color": "#cccccc", "font": {"color": "black"}, "id": "identity--fbd192cb-0ab2-33e3-92cc-c2456bf8d439", "label": "TI Mindmap HUB", "shape": "dot", "title": "{\n  \"type\": \"identity\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"identity--fbd192cb-0ab2-33e3-92cc-c2456bf8d439\",\n  \"created\": \"2026-01-14T21:50:59.819822Z\",\n  \"modified\": \"2026-01-14T21:50:59.819822Z\",\n  \"name\": \"TI Mindmap HUB\",\n  \"description\": \"TI Mindmap HUB is an AI-powered threat intelligence platform that generates STIX bundles from OSINT sources.\",\n  \"identity_class\": \"organization\"\n}"}, {"color": "#cccccc", "font": {"color": "black"}, "id": "marking-definition--94868c89-83c2-464b-929b-a1a8aa3c8487", "label": "TLP:CLEAR", "shape": "dot", "title": "{\n  \"type\": \"marking-definition\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"marking-definition--94868c89-83c2-464b-929b-a1a8aa3c8487\",\n  \"created\": \"2026-01-14T21:50:59.819822Z\",\n  \"definition_type\": \"tlp\",\n  \"name\": \"TLP:CLEAR\",\n  \"definition\": {\n    \"tlp\": \"clear\"\n  }\n}"}, {"color": "#ff4b5c", "font": {"color": "black"}, "id": "attack-pattern--eba1fcee-766b-9d9e-a8d4-c4ffe0038074", "label": "Error Code Taxonomy ", "shape": "dot", "title": "{\n  \"type\": \"attack-pattern\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"attack-pattern--eba1fcee-766b-9d9e-a8d4-c4ffe0038074\",\n  \"created\": \"2026-01-14T21:51:22.337634Z\",\n  \"modified\": \"2026-01-14T21:51:22.337634Z\",\n  \"created_by_ref\": \"identity--d4a47b7a-c415-30f2-52b9-59b8c0f64ab1\",\n  \"name\": \"Error Code Taxonomy for Granular Anti-Analysis Reporting\",\n  \"description\": \"Predator spyware implements a sophisticated error code taxonomy (301-311) that allows operators to diagnose exactly why an implant deployment failed. When an anti-analysis check is triggered, the implant does not simply terminate; it reports a specific error code to the command-and-control infrastructure, then cleans up and exits. This enables operators to distinguish between failures caused by security tools, developer mode, jailbreak detection, geographic restrictions, or multiple instance detection, among others. The system is designed to provide precise feedback, transforming failed deployments into actionable diagnostic events. The non-sequential numbering and missing codes suggest extensibility and shared taxonomy across Intellexa products, allowing for variant-specific or deprecated checks.\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mitre-attack\",\n      \"phase_name\": \"defense-evasion\"\n    }\n  ]\n}"}, {"color": "#ff4b5c", "font": {"color": "black"}, "id": "attack-pattern--c5f9e2de-b8ab-12e5-b9bb-37da48270c32", "label": "Multiple Instance De", "shape": "dot", "title": "{\n  \"type\": \"attack-pattern\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"attack-pattern--c5f9e2de-b8ab-12e5-b9bb-37da48270c32\",\n  \"created\": \"2026-01-14T21:51:22.337755Z\",\n  \"modified\": \"2026-01-14T21:51:22.337755Z\",\n  \"created_by_ref\": \"identity--d4a47b7a-c415-30f2-52b9-59b8c0f64ab1\",\n  \"name\": \"Multiple Instance Detection via Process Enumeration\",\n  \"description\": \"Predator uses the getCountNames() function to enumerate all running processes on the device using sysctl and proc_pidpath APIs. It specifically counts how many processes are running from the staging directory (/private/var/tmp/). If two or more instances are detected, the implant reports error code 311 and aborts. This technique is designed to prevent researchers from running multiple analysis instances simultaneously, thereby limiting the ability to perform parallel reverse engineering or sandboxing. By monitoring its own presence, Predator ensures only a single instance operates, reducing the risk of detection and analysis.\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mitre-attack\",\n      \"phase_name\": \"defense-evasion\"\n    }\n  ]\n}"}, {"color": "#ff4b5c", "font": {"color": "black"}, "id": "attack-pattern--d8cb0e0c-6a49-c105-e449-5cd22480c4c8", "label": "Developer Mode Detec", "shape": "dot", "title": "{\n  \"type\": \"attack-pattern\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"attack-pattern--d8cb0e0c-6a49-c105-e449-5cd22480c4c8\",\n  \"created\": \"2026-01-14T21:51:22.337840Z\",\n  \"modified\": \"2026-01-14T21:51:22.337840Z\",\n  \"created_by_ref\": \"identity--d4a47b7a-c415-30f2-52b9-59b8c0f64ab1\",\n  \"name\": \"Developer Mode Detection Using sysctlbyname\",\n  \"description\": \"The implant includes a targeted check for iOS Developer Mode, which is commonly enabled by security researchers and developers. The is_developer() function calls sysctlbyname(\\\"security.mac.amfi.developer_mode_status\\\") to determine if Developer Mode is active. If detected, Predator aborts execution and reports the event to its operators. This approach allows the spyware to avoid environments likely to be used for analysis or research, reducing the risk of exposure and reverse engineering. By specifically targeting a feature introduced for research purposes, Predator demonstrates an awareness of its threat landscape and adapts its deployment accordingly.\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mitre-attack\",\n      \"phase_name\": \"defense-evasion\"\n    }\n  ]\n}"}, {"color": "#ff4b5c", "font": {"color": "black"}, "id": "attack-pattern--e71c4a48-98a2-c09c-695f-ec38f4af7d92", "label": "Jailbreak Detection ", "shape": "dot", "title": "{\n  \"type\": \"attack-pattern\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"attack-pattern--e71c4a48-98a2-c09c-695f-ec38f4af7d92\",\n  \"created\": \"2026-01-14T21:51:22.338004Z\",\n  \"modified\": \"2026-01-14T21:51:22.338004Z\",\n  \"created_by_ref\": \"identity--d4a47b7a-c415-30f2-52b9-59b8c0f64ab1\",\n  \"name\": \"Jailbreak Detection via File and Directory Checks\",\n  \"description\": \"Predator employs the is_not_phone() function to detect jailbroken devices by checking for the existence of specific files and directories associated with jailbreak tools and package managers. It uses the access() syscall to look for paths such as /bin/bash, /private/var/tmp/cydia.log, /Applications/Cydia.app, /private/var/lib/apt/, /private/var/lib/cydia, /etc/apt, and /private/var/stash. Additionally, it checks if /bin/ contains more than two entries, which is atypical for stock iOS. If any indicators are found, Predator reports the detection and aborts. This method helps the spyware avoid environments where its behavior could be more easily analyzed or modified.\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mitre-attack\",\n      \"phase_name\": \"defense-evasion\"\n    }\n  ],\n  \"external_references\": [\n    {\n      \"source_name\": \"mitre-attack\",\n      \"url\": \"https://attack.mitre.org/techniques/T1516/\",\n      \"external_id\": \"T1516\"\n    }\n  ]\n}"}, {"color": "#ff4b5c", "font": {"color": "black"}, "id": "attack-pattern--f28a0e61-b87c-3e5c-0d1d-45064d9ba331", "label": "Geographic Restricti", "shape": "dot", "title": "{\n  \"type\": \"attack-pattern\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"attack-pattern--f28a0e61-b87c-3e5c-0d1d-45064d9ba331\",\n  \"created\": \"2026-01-14T21:51:22.338100Z\",\n  \"modified\": \"2026-01-14T21:51:22.338100Z\",\n  \"created_by_ref\": \"identity--d4a47b7a-c415-30f2-52b9-59b8c0f64ab1\",\n  \"name\": \"Geographic Restriction Based on Locale Settings\",\n  \"description\": \"Predator incorporates a geographic restriction mechanism that checks the device\u0027s locale settings to avoid executing on devices located in the United States or Israel. If the locale matches either of these jurisdictions, the implant reports error code 309 and refuses to execute. This technique is likely implemented to avoid legal or political repercussions and to reduce the risk of exposure in regions with advanced cybersecurity capabilities. By restricting its operational footprint, Predator minimizes the likelihood of detection by well-resourced organizations and researchers.\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mitre-attack\",\n      \"phase_name\": \"initial-access\"\n    }\n  ]\n}"}, {"color": "#ff4b5c", "font": {"color": "black"}, "id": "attack-pattern--94f70ba6-9de2-de28-0736-1fe4e8b3da21", "label": "Crash Reporter Monit", "shape": "dot", "title": "{\n  \"type\": \"attack-pattern\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"attack-pattern--94f70ba6-9de2-de28-0736-1fe4e8b3da21\",\n  \"created\": \"2026-01-14T21:51:22.338944Z\",\n  \"modified\": \"2026-01-14T21:51:22.338944Z\",\n  \"created_by_ref\": \"identity--d4a47b7a-c415-30f2-52b9-59b8c0f64ab1\",\n  \"name\": \"Crash Reporter Monitoring for Anti-Forensics\",\n  \"description\": \"Predator includes an undocumented crash reporter monitoring system designed to detect if crash logs or crash reporting tools are active on the device. This system enables the implant to identify when its own failures or abnormal terminations are being logged, which could provide valuable forensic evidence to researchers or incident responders. Upon detection, Predator can clean up traces and abort execution, thereby minimizing the forensic footprint and complicating post-infection analysis. This anti-forensics capability is a sophisticated addition to the spyware\u0027s defense-evasion arsenal.\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mitre-attack\",\n      \"phase_name\": \"defense-evasion\"\n    }\n  ]\n}"}, {"color": "#ff4b5c", "font": {"color": "black"}, "id": "attack-pattern--a88ce0ca-2c85-c06f-3a24-068e755d1521", "label": "SpringBoard Hooking ", "shape": "dot", "title": "{\n  \"type\": \"attack-pattern\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"attack-pattern--a88ce0ca-2c85-c06f-3a24-068e755d1521\",\n  \"created\": \"2026-01-14T21:51:22.339118Z\",\n  \"modified\": \"2026-01-14T21:51:22.339118Z\",\n  \"created_by_ref\": \"identity--d4a47b7a-c415-30f2-52b9-59b8c0f64ab1\",\n  \"name\": \"SpringBoard Hooking to Hide Recording Indicators\",\n  \"description\": \"Predator hooks into the iOS SpringBoard process to suppress or hide recording indicators that would normally alert the victim to ongoing audio or screen recording. By modifying the behavior of system UI elements, the spyware ensures that its surveillance activities remain covert and undetectable to the user. This technique directly targets user awareness and leverages deep integration with the operating system to evade detection. The use of SpringBoard hooking demonstrates advanced technical capability and a focus on stealth.\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mitre-attack\",\n      \"phase_name\": \"defense-evasion\"\n    }\n  ],\n  \"external_references\": [\n    {\n      \"source_name\": \"mitre-attack\",\n      \"url\": \"https://attack.mitre.org/techniques/T1556/001/\",\n      \"external_id\": \"T1556.001\"\n    }\n  ]\n}"}, {"color": "#ff9f43", "font": {"color": "black"}, "id": "malware--a573f12a-da39-6d2f-f2f8-7ce41764427c", "label": "Predator", "shape": "dot", "title": "{\n  \"type\": \"malware\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"malware--a573f12a-da39-6d2f-f2f8-7ce41764427c\",\n  \"created\": \"2026-01-14T21:51:27.178724Z\",\n  \"modified\": \"2026-01-14T21:51:27.178724Z\",\n  \"created_by_ref\": \"identity--d4a47b7a-c415-30f2-52b9-59b8c0f64ab1\",\n  \"name\": \"Predator\",\n  \"description\": \"Predator is a sophisticated iOS spyware developed by Intellexa, used for targeted surveillance. It employs advanced anti-analysis techniques, granular error code reporting, and multiple detection mechanisms to evade researchers and security tools.\",\n  \"malware_types\": [\n    \"spyware\",\n    \"remote-access-trojan\"\n  ],\n  \"is_family\": true,\n  \"aliases\": [\n    \"Intellexa Predator\"\n  ],\n  \"x_capabilities\": [\n    \"data-exfiltration\",\n    \"command-and-control\",\n    \"anti-analysis\",\n    \"persistence\",\n    \"remote-access\",\n    \"privilege-escalation\"\n  ]\n}"}, {"color": "#ff9f43", "font": {"color": "black"}, "id": "malware--25793a64-b7ac-365c-9852-e64fe8ef7e8a", "label": "PREYHUNTER", "shape": "dot", "title": "{\n  \"type\": \"malware\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"malware--25793a64-b7ac-365c-9852-e64fe8ef7e8a\",\n  \"created\": \"2026-01-14T21:51:27.178813Z\",\n  \"modified\": \"2026-01-14T21:51:27.178813Z\",\n  \"created_by_ref\": \"identity--d4a47b7a-c415-30f2-52b9-59b8c0f64ab1\",\n  \"name\": \"PREYHUNTER\",\n  \"description\": \"PREYHUNTER is a stager component associated with Predator, responsible for initial infection and deployment of the full spyware payload. It facilitates the exploitation process and prepares the environment for Predator\u0027s main modules.\",\n  \"malware_types\": [\n    \"dropper\",\n    \"stager\"\n  ],\n  \"is_family\": true,\n  \"x_capabilities\": [\n    \"command-and-control\",\n    \"persistence\",\n    \"anti-analysis\"\n  ]\n}"}, {"color": "#cccccc", "font": {"color": "black"}, "id": "threat-actor--72e7545c-12ab-39fe-b6ce-989081203155", "label": "Intellexa", "shape": "dot", "title": "{\n  \"type\": \"threat-actor\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"threat-actor--72e7545c-12ab-39fe-b6ce-989081203155\",\n  \"created\": \"2026-01-14T21:51:32.825031Z\",\n  \"modified\": \"2026-01-14T21:51:32.825031Z\",\n  \"created_by_ref\": \"identity--d4a47b7a-c415-30f2-52b9-59b8c0f64ab1\",\n  \"name\": \"Intellexa\",\n  \"description\": \"Intellexa is explicitly identified as the developer and operator of the Predator spyware platform. In this attack, they are responsible for deploying sophisticated iOS spyware with advanced anti-analysis and anti-forensics capabilities.\",\n  \"threat_actor_types\": [\n    \"criminal\",\n    \"unknown\"\n  ],\n  \"aliases\": [\n    \"Intellexa Consortium\"\n  ],\n  \"goals\": [\n    \"Deploy Predator spyware on target devices\",\n    \"Evade detection and forensic analysis\",\n    \"Collect intelligence from compromised iOS devices\",\n    \"Diagnose and troubleshoot failed deployments\"\n  ],\n  \"sophistication\": \"innovator\",\n  \"primary_motivation\": \"espionage\"\n}"}, {"color": "#cccccc", "font": {"color": "black"}, "id": "threat-actor--51fde138-3521-c22a-9dc0-72dc57253544", "label": "Predator operators", "shape": "dot", "title": "{\n  \"type\": \"threat-actor\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"threat-actor--51fde138-3521-c22a-9dc0-72dc57253544\",\n  \"created\": \"2026-01-14T21:51:32.825143Z\",\n  \"modified\": \"2026-01-14T21:51:32.825143Z\",\n  \"created_by_ref\": \"identity--d4a47b7a-c415-30f2-52b9-59b8c0f64ab1\",\n  \"name\": \"Predator operators\",\n  \"description\": \"Predator operators are referenced as the entities managing and d
