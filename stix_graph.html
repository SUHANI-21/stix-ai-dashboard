                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#cccccc", "font": {"color": "black"}, "id": "identity--61f25293-60ae-c54f-5dc9-804b842cf3fa", "label": "Socket", "shape": "dot", "title": "{\n  \"type\": \"identity\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"identity--61f25293-60ae-c54f-5dc9-804b842cf3fa\",\n  \"created\": \"2026-01-16T09:31:18.941038Z\",\n  \"modified\": \"2026-01-16T09:31:18.941038Z\",\n  \"name\": \"Socket\",\n  \"description\": \"Socket is the publisher of this threat intelligence report. STIXed by TI Mindmap HUB.\",\n  \"identity_class\": \"organization\"\n}"}, {"color": "#cccccc", "font": {"color": "black"}, "id": "identity--fbd192cb-0ab2-33e3-92cc-c2456bf8d439", "label": "TI Mindmap HUB", "shape": "dot", "title": "{\n  \"type\": \"identity\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"identity--fbd192cb-0ab2-33e3-92cc-c2456bf8d439\",\n  \"created\": \"2026-01-16T09:31:18.941038Z\",\n  \"modified\": \"2026-01-16T09:31:18.941038Z\",\n  \"name\": \"TI Mindmap HUB\",\n  \"description\": \"TI Mindmap HUB is an AI-powered threat intelligence platform that generates STIX bundles from OSINT sources.\",\n  \"identity_class\": \"organization\"\n}"}, {"color": "#cccccc", "font": {"color": "black"}, "id": "marking-definition--94868c89-83c2-464b-929b-a1a8aa3c8487", "label": "TLP:CLEAR", "shape": "dot", "title": "{\n  \"type\": \"marking-definition\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"marking-definition--94868c89-83c2-464b-929b-a1a8aa3c8487\",\n  \"created\": \"2026-01-16T09:31:18.941038Z\",\n  \"definition_type\": \"tlp\",\n  \"name\": \"TLP:CLEAR\",\n  \"definition\": {\n    \"tlp\": \"clear\"\n  }\n}"}, {"color": "#ff4b5c", "font": {"color": "black"}, "id": "attack-pattern--72e780e3-d65e-dec7-488f-fbeab940e5d0", "label": "Malicious Chrome Ext", "shape": "dot", "title": "{\n  \"type\": \"attack-pattern\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"attack-pattern--72e780e3-d65e-dec7-488f-fbeab940e5d0\",\n  \"created\": \"2026-01-16T09:31:51.501152Z\",\n  \"modified\": \"2026-01-16T09:31:51.501152Z\",\n  \"created_by_ref\": \"identity--61f25293-60ae-c54f-5dc9-804b842cf3fa\",\n  \"name\": \"Malicious Chrome Extension Deployment for Initial Access\",\n  \"description\": \"Attackers publish Chrome extensions that masquerade as productivity or security tools for enterprise HR and ERP platforms such as Workday, NetSuite, and SuccessFactors. These extensions are distributed via the Chrome Web Store and marketed to users and administrators as legitimate tools for account management and workflow optimization. The extensions request standard permissions that do not appear suspicious during installation, and their privacy policies falsely claim not to collect user data. This social engineering approach enables attackers to gain initial access to enterprise environments by convincing users to install the extensions, thereby granting the malicious code the necessary permissions to operate within the browser context.\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mitre-attack\",\n      \"phase_name\": \"initial-access\"\n    }\n  ],\n  \"external_references\": [\n    {\n      \"source_name\": \"mitre-attack\",\n      \"url\": \"https://attack.mitre.org/techniques/T1195/002/\",\n      \"external_id\": \"T1195.002\"\n    }\n  ]\n}"}, {"color": "#ff4b5c", "font": {"color": "black"}, "id": "attack-pattern--26794465-ddf4-6cd8-ea88-4df73eced529", "label": "Session Cookie Theft", "shape": "dot", "title": "{\n  \"type\": \"attack-pattern\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"attack-pattern--26794465-ddf4-6cd8-ea88-4df73eced529\",\n  \"created\": \"2026-01-16T09:31:51.501352Z\",\n  \"modified\": \"2026-01-16T09:31:51.501352Z\",\n  \"created_by_ref\": \"identity--61f25293-60ae-c54f-5dc9-804b842cf3fa\",\n  \"name\": \"Session Cookie Theft and Exfiltration\",\n  \"description\": \"Several extensions, including DataByCloud Access, Data By Cloud 1, and Software Access, implement automated extraction of authentication cookies\\u2014specifically targeting cookies named \u0027__session\u0027 used for authentication in HR and ERP platforms. The extensions use Chrome\u0027s cookie APIs to retrieve all cookies for targeted domains, filter for authentication tokens, and exfiltrate them to attacker-controlled remote servers (e.g., api.databycloud.com or api.software-access.com) every 60 seconds. This persistent monitoring and exfiltration enables attackers to collect valid session tokens for enterprise accounts, facilitating unauthorized access and account takeover.\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mitre-attack\",\n      \"phase_name\": \"credential-access\"\n    }\n  ],\n  \"external_references\": [\n    {\n      \"source_name\": \"mitre-attack\",\n      \"url\": \"https://attack.mitre.org/techniques/T1539/\",\n      \"external_id\": \"T1539\"\n    }\n  ]\n}"}, {"color": "#ff4b5c", "font": {"color": "black"}, "id": "attack-pattern--129292d4-a5be-d41b-aeb9-c2445842e452", "label": "DOM Manipulation to ", "shape": "dot", "title": "{\n  \"type\": \"attack-pattern\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"attack-pattern--129292d4-a5be-d41b-aeb9-c2445842e452\",\n  \"created\": \"2026-01-16T09:31:51.501457Z\",\n  \"modified\": \"2026-01-16T09:31:51.501457Z\",\n  \"created_by_ref\": \"identity--61f25293-60ae-c54f-5dc9-804b842cf3fa\",\n  \"name\": \"DOM Manipulation to Block Security Administration Pages\",\n  \"description\": \"Extensions such as Tool Access 11 and Data By Cloud 2 actively interfere with enterprise platform security by manipulating the Document Object Model (DOM) of targeted web pages. They erase content and redirect users away from up to 56 critical administrative and incident response pages, including those for password changes, account deactivation, 2FA device management, and audit log access. This prevents legitimate users and security teams from accessing security controls, managing authentication, or responding to incidents, effectively crippling the ability to detect and remediate account compromise.\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mitre-attack\",\n      \"phase_name\": \"defense-evasion\"\n    }\n  ]\n}"}, {"color": "#ff4b5c", "font": {"color": "black"}, "id": "attack-pattern--55f6a4c6-469c-a2e1-db56-6452d72070df", "label": "Bidirectional Sessio", "shape": "dot", "title": "{\n  \"type\": \"attack-pattern\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"attack-pattern--55f6a4c6-469c-a2e1-db56-6452d72070df\",\n  \"created\": \"2026-01-16T09:31:51.501545Z\",\n  \"modified\": \"2026-01-16T09:31:51.501545Z\",\n  \"created_by_ref\": \"identity--61f25293-60ae-c54f-5dc9-804b842cf3fa\",\n  \"name\": \"Bidirectional Session Cookie Injection for Direct Session Hijacking\",\n  \"description\": \"The Software Access extension implements a sophisticated session hijacking technique by not only exfiltrating session cookies to its command and control server but also receiving stolen cookies from the server. Using the chrome.cookies.set() API, the extension injects these cookies into the browser, enabling attackers to assume the session of any targeted account directly within the victim\u0027s browser. This bidirectional manipulation allows for seamless account takeover and persistent unauthorized access, bypassing traditional authentication mechanisms.\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mitre-attack\",\n      \"phase_name\": \"privilege-escalation\"\n    }\n  ]\n}"}, {"color": "#ff4b5c", "font": {"color": "black"}, "id": "attack-pattern--8045fc1e-fcc6-9eaa-b70c-6059df476dea", "label": "Blocking Browser Dev", "shape": "dot", "title": "{\n  \"type\": \"attack-pattern\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"attack-pattern--8045fc1e-fcc6-9eaa-b70c-6059df476dea\",\n  \"created\": \"2026-01-16T09:31:51.501626Z\",\n  \"modified\": \"2026-01-16T09:31:51.501626Z\",\n  \"created_by_ref\": \"identity--61f25293-60ae-c54f-5dc9-804b842cf3fa\",\n  \"name\": \"Blocking Browser Developer Tools to Prevent Code Inspection\",\n  \"description\": \"Data By Cloud 1 incorporates the DisableDevtool library to actively block access to browser developer tools. By preventing users and security analysts from inspecting the extension\u0027s code or monitoring its behavior through developer tools, the attackers increase the difficulty of detection and analysis. This technique helps maintain the stealth of malicious activities such as cookie theft and DOM manipulation, prolonging the extension\u0027s presence in the victim environment.\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mitre-attack\",\n      \"phase_name\": \"defense-evasion\"\n    }\n  ]\n}"}, {"color": "#ff4b5c", "font": {"color": "black"}, "id": "attack-pattern--ee586b17-fa3e-feb5-b8c1-fefed885cf08", "label": "Password Field Prote", "shape": "dot", "title": "{\n  \"type\": \"attack-pattern\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"attack-pattern--ee586b17-fa3e-feb5-b8c1-fefed885cf08\",\n  \"created\": \"2026-01-16T09:31:51.501704Z\",\n  \"modified\": \"2026-01-16T09:31:51.501704Z\",\n  \"created_by_ref\": \"identity--61f25293-60ae-c54f-5dc9-804b842cf3fa\",\n  \"name\": \"Password Field Protection to Prevent Credential Inspection\",\n  \"description\": \"The Software Access extension includes mechanisms to protect password input fields from inspection. This prevents users and analysts from viewing or extracting credentials entered into the browser, further complicating incident response and forensic analysis. By obfuscating or blocking access to password fields, the attackers reduce the likelihood of their credential theft activities being discovered or interrupted.\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mitre-attack\",\n      \"phase_name\": \"defense-evasion\"\n    }\n  ]\n}"}, {"color": "#ff4b5c", "font": {"color": "black"}, "id": "attack-pattern--367a02bd-1374-fd4b-69c6-2da25aae35ee", "label": "Persistent Monitorin", "shape": "dot", "title": "{\n  \"type\": \"attack-pattern\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"attack-pattern--367a02bd-1374-fd4b-69c6-2da25aae35ee\",\n  \"created\": \"2026-01-16T09:31:51.501783Z\",\n  \"modified\": \"2026-01-16T09:31:51.501783Z\",\n  \"created_by_ref\": \"identity--61f25293-60ae-c54f-5dc9-804b842cf3fa\",\n  \"name\": \"Persistent Monitoring of Authentication State\",\n  \"description\": \"Extensions maintain continuous surveillance of the authentication state by periodically extracting session tokens and monitoring user activity on enterprise platforms. This persistent monitoring ensures that attackers receive up-to-date credentials and can maintain access even as authentication tokens change or sessions are refreshed. The extensions\u0027 background scripts automate this process, enabling long-term compromise and facilitating ongoing account hijacking.\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mitre-attack\",\n      \"phase_name\": \"persistence\"\n    }\n  ]\n}"}, {"color": "#ff4b5c", "font": {"color": "black"}, "id": "attack-pattern--1a318bb6-79b6-0366-00e5-26086e2476c0", "label": "Encrypted Command an", "shape": "dot", "title": "{\n  \"type\": \"attack-pattern\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"attack-pattern--1a318bb6-79b6-0366-00e5-26086e2476c0\",\n  \"created\": \"2026-01-16T09:31:51.501835Z\",\n  \"modified\": \"2026-01-16T09:31:51.501835Z\",\n  \"created_by_ref\": \"identity--61f25293-60ae-c54f-5dc9-804b842cf3fa\",\n  \"name\": \"Encrypted Command and Control Traffic for Cookie Exfiltration\",\n  \"description\": \"The extensions encrypt traffic sent to their command and control servers when exfiltrating session tokens and authentication cookies. This encryption helps evade network-based detection mechanisms and makes it more difficult for defenders to identify or analyze the stolen data in transit. By securing the exfiltration channel, attackers increase the success rate of credential theft and reduce the risk of interception by enterprise security tools.\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mitre-attack\",\n      \"phase_name\": \"exfiltration\"\n    }\n  ],\n  \"external_references\": [\n    {\n      \"source_name\": \"mitre-attack\",\n      \"url\": \"https://attack.mitre.org/techniques/T1041/\",\n      \"external_id\": \"T1041\"\n    }\n  ]\n}"}, {"color": "#ff9f43", "font": {"color": "black"}, "id": "malware--d155005c-19f8-0f62-9c02-92a4f6d5a6ae", "label": "DataByCloud", "shape": "dot", "title": "{\n  \"type\": \"malware\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"malware--d155005c-19f8-0f62-9c02-92a4f6d5a6ae\",\n  \"created\": \"2026-01-16T09:31:59.840038Z\",\n  \"modified\": \"2026-01-16T09:31:59.840038Z\",\n  \"created_by_ref\": \"identity--61f25293-60ae-c54f-5dc9-804b842cf3fa\",\n  \"name\": \"DataByCloud\",\n  \"description\": \"DataByCloud is a family of malicious Chrome extensions masquerading as productivity tools for enterprise HR and ERP systems. They steal authentication cookies, block access to security administration pages, and interfere with incident response, enabling session hijacking and account takeover.\",\n  \"malware_types\": [\n    \"trojan\",\n    \"spyware\"\n  ],\n  \"is_family\": true,\n  \"aliases\": [\n    \"DataByCloud Access\",\n    \"Data By Cloud 1\",\n    \"Data By Cloud 2\"\n  ],\n  \"x_capabilities\": [\n    \"data-exfiltration\",\n    \"credential-theft\",\n    \"anti-analysis\",\n    \"persistence\"\n  ]\n}"}, {"color": "#ff9f43", "font": {"color": "black"}, "id": "malware--d6221321-4616-d56c-09ff-58caa4752e6d", "label": "Tool Access 11", "shape": "dot", "title": "{\n  \"type\": \"malware\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"malware--d6221321-4616-d56c-09ff-58caa4752e6d\",\n  \"created\": \"2026-01-16T09:31:59.840125Z\",\n  \"modified\": \"2026-01-16T09:31:59.840125Z\",\n  \"created_by_ref\": \"identity--61f25293-60ae-c54f-5dc9-804b842cf3fa\",\n  \"name\": \"Tool Access 11\",\n  \"description\": \"Tool Access 11 is a Chrome extension that blocks access to administrative and security pages within enterprise platforms, preventing users from managing authentication and incident response settings. It is used to disrupt security controls and facilitate unauthorized access.\",\n  \"malware_types\": [\n    \"trojan\",\n    \"spyware\"\n  ],\n  \"is_family\": true,\n  \"x_capabilities\": [\n    \"anti-analysis\",\n    \"persistence\"\n  ]\n}"}, {"color": "#ff9f43", "font": {"color": "black"}, "id": "malware--569cc7cd-dbdb-9d55-af0e-5ed49262f206", "label": "Software Access", "shape": "dot", "title": "{\n  \"type\": \"malware\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"malware--569cc7cd-dbdb-9d55-af0e-5ed49262f206\",\n  \"created\": \"2026-01-16T09:31:59.840180Z\",\n  \"modified\": \"2026-01-16T09:31:59.840180Z\",\n  \"created_by_ref\": \"identity--61f25293-60ae-c54f-5dc9-804b842cf3fa\",\n  \"name\": \"Software Access\",\n  \"description\": \"Software Access is a malicious Chrome extension that exfiltrates authentication tokens and injects stolen cookies to enable direct session hijacking. It also implements protections against inspection of credential inputs and shares infrastructure patterns with DataByCloud extensions.\",\n  \"malware_types\": [\n    \"trojan\",\n    \"spyware\"\n  ],\n  \"is_family\": true,\n  \"x_capabilities\": [\n    \"data-exfiltration\",\n    \"credential-theft\",\n    \"remote-access\",\n    \"anti-analysis\",\n    \"persistence\"\n  ]\n}"}, {"color": "#cccccc", "font": {"color": "black"}, "id": "threat-actor--113be3c2-c7df-98fe-0ffb-f1afeea191e2", "label": "databycloud1104", "shape": "dot", "title": "{\n  \"type\": \"threat-actor\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"threat-actor--113be3c2-c7df-98fe-0ffb-f1afeea191e2\",\n  \"created\": \"2026-01-16T09:32:06.016876Z\",\n  \"modified\": \"2026-01-16T09:32:06.016876Z\",\n  \"created_by_ref\": \"identity--61f25293-60ae-c54f-5dc9-804b842cf3fa\",\n  \"name\": \"databycloud1104\",\n  \"description\": \"The publisher \u0027databycloud1104\u0027 is responsible for four of the malicious Chrome extensions targeting enterprise HR and ERP platforms. These extensions work together to steal authentication tokens, block incident response capabilities, and enable account takeover through session hijacking.\",\n  \"threat_actor_types\": [\n    \"unknown\"\n  ],\n  \"aliases\": [\n    \"DataByCloud\",\n    \"DataByCloud Access\",\n    \"Data By Cloud 1\",\n    \"Data By Cloud 2\",\n    \"Tool Access 11\"\n  ],\n  \"goals\": [\n    \"Steal authentication tokens\",\n    \"Block incident response and security controls\",\n    \"Enable complete account takeover via session hijacking\"\n  ],\n  \"sophistication\": \"advanced\",\n  \"primary_motivation\": \"financial\"\n}"}, {"color": "#cccccc", "font": {"color": "black"}, "id": "threat-actor--88a3b19d-6549-2c28-a5c6-d0a8df2a47d7", "label": "softwareaccess", "shape": "dot", "title": "{\n  \"type\": \"threat-actor\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"threat-actor--88a3b19d-6549-2c28-a5c6-d0a8df2a47d7\",\n  \"created\": \"2026-01-16T09:32:06.016970Z\",\n  \"modified\": \"2026-01-16T09:32:06.016970Z\",\n  \"created_by_ref\": \"identity--61f25293-60ae-c54f-5dc9-804b842cf3fa\",\n  \"name\": \"softwareaccess\",\n  \"description\": \"The publisher \u0027softwareaccess\u0027 operates the fifth malicious Chrome extension, sharing identical infrastructure and attack patterns with the databycloud1104 group. This extension exfiltrates authentication tokens and enables direct session hijacking through bidirectional cookie injection.\",\n  \"threat_actor_types\": [\n    \"unknown\"\n  ],\n  \"aliases\": [\n    \"Software Access\"\n  ],\n  \"goals\": [\n    \"Steal authentication tokens\",\n    \"Enable direct session hijacking\",\n    \"Bypass security controls and incident response\"\n  ],\n  \"sophistication\": \"advanced\",\n  \"primary_motivation\": \"financial\"\n}"}, {"color": "#1dd1a1", "font": {"color": "black"}, "id": "tool--fcbcabb8-a0bf-b367-b2cb-e40dc2c4355b", "label": "Chrome Extension API", "shape": "dot", "title": "{\n  \"type\": \"tool\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"tool--fcbcabb8-a0bf-b367-b2cb-e40dc2c4355b\",\n  \"created\": \"2026-01-16T09:32:13.521300Z\",\n  \"modified\": \"2026-01-16T09:32:13.521300Z\",\n  \"created_by_ref\": \"identity--61f25293-60ae-c54f-5dc9-804b842cf3fa\",\n  \"name\": \"Chrome Extension API (chrome.cookies)\",\n  \"description\": \"The malicious extensions abuse the legitimate Chrome Extension API, specifically the chrome.cookies module, to programmatically access, extract, and inject authentication cookies for enterprise HR and ERP platforms, enabling session hijacking and credential theft.\",\n  \"tool_types\": [\n    \"credential-exploitation\",\n    \"information-gathering\"\n  ],\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mitre-attack\",\n      \"phase_name\": \"credential-access\"\n    }\n  ]\n}"}, {"color": "#1dd1a1", "font": {"color": "black"}, "id": "tool--a13e2556-405b-6abb-3f6d-2dd2edf6ed56", "label": "Chrome Extension API", "shape": "dot", "title": "{\n  \"type\": \"tool\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"tool--a13e2556-405b-6abb-3f6d-2dd2edf6ed56\",\n  \"created\": \"2026-01-16T09:32:13.521561Z\",\n  \"modified\": \"2026-01-16T09:32:13.521561Z\",\n  \"created_by_ref\": \"identity--61f25293-60ae-c54f-5dc9-804b842cf3fa\",\n  \"name\": \"Chrome Extension API (chrome.cookies.set)\",\n  \"description\": \"The extensions use the chrome.cookies.set() function to inject stolen authentication cookies into the browser, allowing attackers to hijack sessions by impersonating legitimate users on targeted platforms.\",\n  \"tool_types\": [\n    \"credential-exploitation\"\n  ],\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mitre-attack\",\n      \"phase_name\": \"lateral-movement\"\n    }\n  ]\n}"}, {"color": "#1dd1a1", "font": {"color": "black"}, "id": "tool--6b9ab10b-a0d6-c163-5e7c-cf86e6265bff", "label": "Chrome Extension API", "shape": "dot", "title": "{\n  \"type\": \"tool\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"tool--6b9ab10b-a0d6-c163-5e7c-cf86e6265bff\",\n  \"created\": \"2026-01-16T09:32:13.524604Z\",\n  \"modified\": \"2026-01-16T09:32:13.524604Z\",\n  \"created_by_ref\": \"identity--61f25293-60ae-c54f-5dc9-804b842cf3fa\",\n  \"name\": \"Chrome Extension API (chrome.cookies.getAll)\",\n  \"description\": \"The extensions leverage chrome.cookies.getAll to enumerate and extract all cookies for specified domains, filtering for authentication tokens to exfiltrate to attacker-controlled infrastructure.\",\n  \"tool_types\": [\n    \"credential-exploitation\",\n    \"information-gathering\"\n  ],\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mitre-attack\",\n      \"phase_name\": \"collection\"\n    }\n  ]\n}"}, {"color": "#1dd1a1", "font": {"color": "black"}, "id": "tool--ec28c7f9-820c-3114-53db-b73751c830b9", "label": "Chrome Extension API", "shape": "dot", "title": "{\n  \"type\": \"tool\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"tool--ec28c7f9-820c-3114-53db-b73751c830b9\",\n  \"created\": \"2026-01-16T09:32:13.524991Z\",\n  \"modified\": \"2026-01-16T09:32:13.524991Z\",\n  \"created_by_ref\": \"identity--61f25293-60ae-c54f-5dc9-804b842cf3fa\",\n  \"name\": \"Chrome Extension API (chrome.scripting, chrome.management, chrome.declarativeNetRequest, chrome.storage)\",\n  \"description\": \"The extensions request and abuse standard Chrome extension permissions such as scripting, management, declarativeNetRequest, and storage to manipulate web pages, block access to security administration interfaces, and maintain persistence.\",\n  \"tool_types\": [\n    \"defense-evasion\",\n    \"information-gathering\"\n  ],\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mitre-attack\",\n      \"phase_name\": \"defense-evasion\"\n    }\n  ]\n}"}
