7:96:42:03:bc:45:42:24:75:6c\u0027\",\n  \"description\": \"Test description.\",\n  \"pattern\": \"[x509-certificate:issuer = \u0027CN=LM-68AB71FBD8F5\u0027 AND x509-certificate:serial_number = \u00270e:97:88:1c:6c:a1:37:96:42:03:bc:45:42:24:75:6c\u0027]\",\n  \"indicator_types\": [\n    \"malicious-activity\"\n  ],\n  \"valid_from\": \"2015-05-15T09:12:16.432678Z\"\n}"}, {"color": "#ff9f43", "font": {"color": "white"}, "id": "malware--2485b844-4efe-4343-84c8-eb33312dd56f", "label": "MANITSME", "shape": "dot", "title": "{\n  \"type\": \"malware\",\n  \"spec_version\": \"2.1\",\n  \"is_family\": false,\n  \"id\": \"malware--2485b844-4efe-4343-84c8-eb33312dd56f\",\n  \"created\": \"2015-05-15T09:12:16.432Z\",\n  \"modified\": \"2015-05-15T09:12:16.432Z\",\n  \"name\": \"MANITSME\",\n  \"malware_types\": [\n    \"backdoor\",\n    \"dropper\",\n    \"remote-access-trojan\"\n  ],\n  \"description\": \"This malware will beacon out at random intervals to the remote attacker. The attacker can run programs, execute arbitrary commands, and easily upload and download files.\"\n}"}, {"color": "#ff9f43", "font": {"color": "white"}, "id": "malware--c0217091-9d3d-42a1-8952-ccc12d4ad8d0", "label": "WEBC2-UGX", "shape": "dot", "title": "{\n  \"type\": \"malware\",\n  \"spec_version\": \"2.1\",\n  \"is_family\": false,\n  \"id\": \"malware--c0217091-9d3d-42a1-8952-ccc12d4ad8d0\",\n  \"created\": \"2015-05-15T09:12:16.432Z\",\n  \"modified\": \"2015-05-15T09:12:16.432Z\",\n  \"name\": \"WEBC2-UGX\",\n  \"malware_types\": [\n    \"backdoor\",\n    \"remote-access-trojan\"\n  ],\n  \"description\": \"A WEBC2 backdoor is designed to retrieve a Web page from a C2 server. It expects the page to contain special HTML tags; the backdoor will attempt to interpret the data between the tags as commands.\"\n}"}, {"color": "#ff9f43", "font": {"color": "white"}, "id": "malware--0f01c5a3-f516-4450-9381-4dd9f2279411", "label": "WEBC2 Backdoor", "shape": "dot", "title": "{\n  \"type\": \"malware\",\n  \"spec_version\": \"2.1\",\n  \"is_family\": false,\n  \"id\": \"malware--0f01c5a3-f516-4450-9381-4dd9f2279411\",\n  \"created\": \"2015-05-15T09:12:16.432Z\",\n  \"modified\": \"2015-05-15T09:12:16.432Z\",\n  \"name\": \"WEBC2 Backdoor\",\n  \"malware_types\": [\n    \"backdoor\",\n    \"remote-access-trojan\"\n  ],\n  \"description\": \"A WEBC2 backdoor is designed to retrieve a Web page from a C2 server. It expects the page to contain special HTML tags; the backdoor will attempt to interpret the data between the tags as commands.\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mandiant-attack-lifecycle-model\",\n      \"phase_name\": \"establish-foothold\"\n    }\n  ]\n}"}, {"color": "#ff9f43", "font": {"color": "white"}, "id": "malware--33159b98-3264-4e10-a968-d67975b6272f", "label": "HUC Packet Transmit ", "shape": "dot", "title": "{\n  \"type\": \"malware\",\n  \"spec_version\": \"2.1\",\n  \"is_family\": false,\n  \"id\": \"malware--33159b98-3264-4e10-a968-d67975b6272f\",\n  \"created\": \"2015-05-15T09:12:16.432Z\",\n  \"modified\": \"2015-05-15T09:12:16.432Z\",\n  \"name\": \"HUC Packet Transmit Tool (HTRAN)\",\n  \"malware_types\": [\n    \"backdoor\",\n    \"remote-access-trojan\"\n  ],\n  \"description\": \"When APT1 attackers are not using WEBC2, they require a \\u201ccommand and control\\u201d (C2) user interface so they can issue commands to the backdoor. This interface sometimes runs on their personal attack system, which is typically in Shanghai. In these instances, when a victim backdoor makes contact with a hop, the communications need to be forwarded from the hop to the intruder\\u2019s Shanghai system so the backdoor can talk to the C2 server software. We have observed 767 separate instances in which APT1 intruders used the publicly available \\u201cHUC Packet Transmit Tool\\u201d or HTRAN on a hopThe HTRAN utility is merely a middle-man, facilitating connections between the victim and the attacker who is using the hop point.\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mandiant-attack-lifecycle-model\",\n      \"phase_name\": \"establish-foothold\"\n    }\n  ]\n}"}, {"color": "#ff9f43", "font": {"color": "white"}, "id": "malware--fb490cdb-6760-41eb-a79b-0b930a50c017", "label": "AURIGA", "shape": "dot", "title": "{\n  \"type\": \"malware\",\n  \"spec_version\": \"2.1\",\n  \"is_family\": true,\n  \"id\": \"malware--fb490cdb-6760-41eb-a79b-0b930a50c017\",\n  \"created\": \"2015-05-15T09:12:16.432Z\",\n  \"modified\": \"2015-05-15T09:12:16.432Z\",\n  \"name\": \"AURIGA\",\n  \"malware_types\": [\n    \"backdoor\",\n    \"keylogger\"\n  ],\n  \"description\": \"Malware family that contains functionality for keystroke logging, creating and killing processes, performing file system and registry modifications, etc.\"\n}"}, {"color": "#ff9f43", "font": {"color": "white"}, "id": "malware--ea50ecb7-2cd4-4895-bd08-31cd591ed0ca", "label": "BANGAT", "shape": "dot", "title": "{\n  \"type\": \"malware\",\n  \"spec_version\": \"2.1\",\n  \"is_family\": false,\n  \"id\": \"malware--ea50ecb7-2cd4-4895-bd08-31cd591ed0ca\",\n  \"created\": \"2015-05-15T09:12:16.432Z\",\n  \"modified\": \"2015-05-15T09:12:16.432Z\",\n  \"name\": \"BANGAT\",\n  \"malware_types\": [\n    \"backdoor\",\n    \"keylogger\"\n  ],\n  \"description\": \"Malware family that contains functionality for keylogging, creating and killing processes, performing filesystem and registry modifications, etc.\"\n}"}, {"color": "#1dd1a1", "font": {"color": "white"}, "id": "tool--ce45f721-af14-4fc0-938c-000c16186418", "label": "cachedump", "shape": "dot", "title": "{\n  \"type\": \"tool\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"tool--ce45f721-af14-4fc0-938c-000c16186418\",\n  \"created\": \"2015-05-15T09:12:16.432Z\",\n  \"modified\": \"2015-05-15T09:12:16.432Z\",\n  \"name\": \"cachedump\",\n  \"tool_types\": [\n    \"credential-exploitation\"\n  ],\n  \"description\": \"This program extracts cached password hashes from a system\\u2019s registry.\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mandiant-attack-lifecycle-model\",\n      \"phase_name\": \"escalate-privileges\"\n    }\n  ]\n}"}, {"color": "#1dd1a1", "font": {"color": "white"}, "id": "tool--e9778c42-bc2f-4eda-9fb4-6a931834f68c", "label": "fgdump", "shape": "dot", "title": "{\n  \"type\": \"tool\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"tool--e9778c42-bc2f-4eda-9fb4-6a931834f68c\",\n  \"created\": \"2015-05-15T09:12:16.432Z\",\n  \"modified\": \"2015-05-15T09:12:16.432Z\",\n  \"name\": \"fgdump\",\n  \"tool_types\": [\n    \"credential-exploitation\"\n  ],\n  \"description\": \"Windows password hash dumper\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mandiant-attack-lifecycle-model\",\n      \"phase_name\": \"escalate-privileges\"\n    }\n  ],\n  \"external_references\": [\n    {\n      \"source_name\": \"fgdump\",\n      \"url\": \"http://www.foofus.net/fizzgig/fgdump/\"\n    }\n  ]\n}"}, {"color": "#1dd1a1", "font": {"color": "white"}, "id": "tool--1cf6a3b8-be43-4c1a-b042-546a890c31b2", "label": "gsecdump", "shape": "dot", "title": "{\n  \"type\": \"tool\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"tool--1cf6a3b8-be43-4c1a-b042-546a890c31b2\",\n  \"created\": \"2015-05-15T09:12:16.432Z\",\n  \"modified\": \"2015-05-15T09:12:16.432Z\",\n  \"name\": \"gsecdump\",\n  \"tool_types\": [\n    \"credential-exploitation\"\n  ],\n  \"description\": \"Obtains password hashes from the Windows registry, including the SAM file, cached domain credentials, and LSA secrets\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mandiant-attack-lifecycle-model\",\n      \"phase_name\": \"escalate-privileges\"\n    }\n  ],\n  \"external_references\": [\n    {\n      \"source_name\": \"gsecdump\",\n      \"url\": \"http://www.truesec.se\"\n    }\n  ]\n}"}, {"color": "#1dd1a1", "font": {"color": "white"}, "id": "tool--4d82bd3e-24a3-4f9d-b8f3-b57267fe06a9", "label": "lslsass", "shape": "dot", "title": "{\n  \"type\": \"tool\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"tool--4d82bd3e-24a3-4f9d-b8f3-b57267fe06a9\",\n  \"created\": \"2015-05-15T09:12:16.432Z\",\n  \"modified\": \"2015-05-15T09:12:16.432Z\",\n  \"name\": \"lslsass\",\n  \"tool_types\": [\n    \"credential-exploitation\"\n  ],\n  \"description\": \"Dump active logon session password hashes from the lsass process\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mandiant-attack-lifecycle-model\",\n      \"phase_name\": \"escalate-privileges\"\n    }\n  ],\n  \"external_references\": [\n    {\n      \"source_name\": \"lslsass\",\n      \"url\": \"http://www.truesec.se\"\n    }\n  ]\n}"}, {"color": "#1dd1a1", "font": {"color": "white"}, "id": "tool--7de5dfcc-6809-4772-9f11-cf26c2be53aa", "label": "mimikatz", "shape": "dot", "title": "{\n  \"type\": \"tool\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"tool--7de5dfcc-6809-4772-9f11-cf26c2be53aa\",\n  \"created\": \"2015-05-15T09:12:16.432Z\",\n  \"modified\": \"2015-05-15T09:12:16.432Z\",\n  \"name\": \"mimikatz\",\n  \"tool_types\": [\n    \"credential-exploitation\"\n  ],\n  \"description\": \"A utility primarily used for dumping password hashes\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mandiant-attack-lifecycle-model\",\n      \"phase_name\": \"escalate-privileges\"\n    }\n  ],\n  \"external_references\": [\n    {\n      \"source_name\": \"mimikatz\",\n      \"url\": \"http://blog.gentilkiwi.com/mimikatz\"\n    }\n  ]\n}"}, {"color": "#1dd1a1", "font": {"color": "white"}, "id": "tool--266b12f2-aa16-4607-809e-f2d33eebb52e", "label": "pass-the-hash toolki", "shape": "dot", "title": "{\n  \"type\": \"tool\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"tool--266b12f2-aa16-4607-809e-f2d33eebb52e\",\n  \"created\": \"2015-05-15T09:12:16.432Z\",\n  \"modified\": \"2015-05-15T09:12:16.432Z\",\n  \"name\": \"pass-the-hash toolkit\",\n  \"tool_types\": [\n    \"credential-exploitation\"\n  ],\n  \"description\": \"Allows an intruder to \\u201cpass\\u201d a password hash (without knowing the original password) to log in to systems\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mandiant-attack-lifecycle-model\",\n      \"phase_name\": \"escalate-privileges\"\n    }\n  ],\n  \"external_references\": [\n    {\n      \"source_name\": \"pass-the-hash toolkit\",\n      \"url\": \"http://oss.coresecurity.com/projects/pshtoolkit.htm\"\n    }\n  ]\n}"}, {"color": "#1dd1a1", "font": {"color": "white"}, "id": "tool--98fd8dc1-6cc7-4908-899f-07473f55149a", "label": "pwdump7", "shape": "dot", "title": "{\n  \"type\": \"tool\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"tool--98fd8dc1-6cc7-4908-899f-07473f55149a\",\n  \"created\": \"2015-05-15T09:12:16.432Z\",\n  \"modified\": \"2015-05-15T09:12:16.432Z\",\n  \"name\": \"pwdump7\",\n  \"tool_types\": [\n    \"credential-exploitation\"\n  ],\n  \"description\": \"Dumps password hashes from the Windows registry\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mandiant-attack-lifecycle-model\",\n      \"phase_name\": \"escalate-privileges\"\n    }\n  ],\n  \"external_references\": [\n    {\n      \"source_name\": \"pwdump7\",\n      \"url\": \"http://www.tarasco.org/security/pwdump_7/\"\n    }\n  ]\n}"}, {"color": "#1dd1a1", "font": {"color": "white"}, "id": "tool--4215b0e5-928e-4b2a-9b5f-64819f287f48", "label": "pwdumpX", "shape": "dot", "title": "{\n  \"type\": \"tool\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"tool--4215b0e5-928e-4b2a-9b5f-64819f287f48\",\n  \"created\": \"2015-05-15T09:12:16.432Z\",\n  \"modified\": \"2015-05-15T09:12:16.432Z\",\n  \"name\": \"pwdumpX\",\n  \"tool_types\": [\n    \"credential-exploitation\"\n  ],\n  \"description\": \"Dumps password hashes from the Windows registry\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mandiant-attack-lifecycle-model\",\n      \"phase_name\": \"escalate-privileges\"\n    }\n  ]\n}"}, {"color": "#1dd1a1", "font": {"color": "white"}, "id": "tool--a6dd62d0-9683-48bf-a9cd-61e7eceae57e", "label": "GETMAIL", "shape": "dot", "title": "{\n  \"type\": \"tool\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"tool--a6dd62d0-9683-48bf-a9cd-61e7eceae57e\",\n  \"created\": \"2015-05-15T09:12:16.432Z\",\n  \"modified\": \"2015-05-15T09:12:16.432Z\",\n  \"name\": \"GETMAIL\",\n  \"tool_types\": [\n    \"information-gathering\"\n  ],\n  \"description\": \"GETMAIL was designed specifically to extract email messages, attachments, and folders from within Microsoft Outlook archive (\\u201cPST\\u201d) files.\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mandiant-attack-lifecycle-model\",\n      \"phase_name\": \"complete-mission\"\n    }\n  ]\n}"}, {"color": "#1dd1a1", "font": {"color": "white"}, "id": "tool--806a8f83-4913-4216-bb19-02b48ae25da5", "label": "MAPIGET", "shape": "dot", "title": "{\n  \"type\": \"tool\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"tool--806a8f83-4913-4216-bb19-02b48ae25da5\",\n  \"created\": \"2015-05-15T09:12:16.432Z\",\n  \"modified\": \"2015-05-15T09:12:16.432Z\",\n  \"name\": \"MAPIGET\",\n  \"tool_types\": [\n    \"information-gathering\"\n  ],\n  \"description\": \"MAPIGET was designed specifically to steal email that has not yet been archived and still resides on a Microsoft Exchange Server.\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mandiant-attack-lifecycle-model\",\n      \"phase_name\": \"complete-mission\"\n    }\n  ]\n}"}, {"color": "#ff4b5c", "font": {"color": "white"}, "id": "attack-pattern--3098c57b-d623-4c11-92f4-5905da66658b", "label": "Initial Compromise", "shape": "dot", "title": "{\n  \"type\": \"attack-pattern\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"attack-pattern--3098c57b-d623-4c11-92f4-5905da66658b\",\n  \"created\": \"2015-05-15T09:12:16.432Z\",\n  \"modified\": \"2015-05-15T09:12:16.432Z\",\n  \"name\": \"Initial Compromise\",\n  \"description\": \"As with most other APT groups, spear phishing is APT1\\u2019s most commonly used technique. The spear phishing emails contain either a malicious attachment or a hyperlink to a malicious file. The subject line and the text in the email body are usually relevant to the recipient. APT1 also creates webmail accounts using real peoples\\u2019 names \\u2014 names that are familiar to the recipient, such as a colleague, a company executive, an IT department employee, or company counsel. The files they use contain malicious executables that install a custom APT1 backdoor that we call WEBC2-TABLE.\",\n  \"external_references\": [\n    {\n      \"source_name\": \"capec\",\n      \"description\": \"spear phishing\",\n      \"external_id\": \"CAPEC-163\"\n    }\n  ],\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mandiant-attack-lifecycle-model\",\n      \"phase_name\": \"initial-compromise\"\n    }\n  ]\n}"}, {"color": "#ff4b5c", "font": {"color": "white"}, "id": "attack-pattern--1e2c4237-d469-4144-9c0b-9e5c0c513c49", "label": "Establishing a Footh", "shape": "dot", "title": "{\n  \"type\": \"attack-pattern\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"attack-pattern--1e2c4237-d469-4144-9c0b-9e5c0c513c49\",\n  \"created\": \"2015-05-15T09:12:16.432Z\",\n  \"modified\": \"2015-05-15T09:12:16.432Z\",\n  \"name\": \"Establishing a Foothold\",\n  \"description\": \"APT1 establishes a foothold once email recipients open a malicious file and a backdoor is subsequently installed.  In almost every case, APT backdoors initiate outbound connections to the intruder\\u2019s \u0027command and control\u0027 (C2) server. While APT1 intruders occasionally use publicly available backdoors such as Poison Ivy and Gh0st RAT, the vast majority of the time they use what appear to be their own custom backdoors. APT1\\u2019s backdoors are in two categories: \u0027Beachhead Backdoors\u0027 and \u0027Standard Backdoors.\u0027 Beachhead Backdoors offer the attacker a toe-hold to perform simple tasks like retrieve files, gather basic system information and trigger the execution of other more significant capabilities such as a standard backdoor. APT1\\u2019s beachhead backdoors are usually what we call WEBC2 backdoors. WEBC2 backdoors are probably the most well-known kind of APT1 backdoor, and are the reason why some security companies refer to APT1 as the Comment Crew. A WEBC2 backdoor is designed to retrieve a webpage from a C2 server. It expects the webpage to contain special HTML tags; the backdoor will attempt to interpret the data between the tags as commands. WEBC2 backdoors are often packaged with spear phishing emails. Once installed, APT1 intruders have the option to tell victim systems to download and execute additional malicious software of their choice. The standard, non-WEBC2 APT1 backdoor typically communicates using the HTTP protocol (to blend in with legitimate web traffic) or a custom protocol that the malware authors designed themselves. The BISCUIT backdoor (so named for the command \\u201cbdkzt\\u201d) is an illustrative example of the range of commands that APT1 has built into its \\u201cstandard\\u201d backdoors. APT1 has used and steadily modified BISCUIT since as early as 2007 and continues to use it presently. Some APT backdoors attempt to mimic legitimate Internet traffic other than the HTTP protocol. When network defenders see the communications between these backdoors and their C2 servers, they might easily dismiss them as legitimate network traffic. Additionally, many of APT1\\u2019s backdoors use SSL encryption so that communications are hidden in an encrypted SSL tunnel.\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mandiant-attack-lifecycle-model\",\n      \"phase_name\": \"establish-foothold\"\n    }\n  ]\n}"}, {"color": "#ff4b5c", "font": {"color": "white"}, "id": "attack-pattern--e13f3e6d-4f9c-4265-b1cf-f997a1bf7827", "label": "Privilege Escalation", "shape": "dot", "title": "{\n  \"type\": \"attack-pattern\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"attack-pattern--e13f3e6d-4f9c-4265-b1cf-f997a1bf7827\",\n  \"created\": \"2015-05-15T09:12:16.432Z\",\n  \"modified\": \"2015-05-15T09:12:16.432Z\",\n  \"name\": \"Privilege Escalation\",\n  \"description\": \"Escalating privileges involves acquiring items (most often usernames and passwords) that will allow access to more resources within the network. APT1 predominantly uses publicly available tools to dump password hashes from victim systems in order to obtain legitimate user credentials.\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mandiant-attack-lifecycle-model\",\n      \"phase_name\": \"escalate-privileges\"\n    }\n  ]\n}"}, {"color": "#ff4b5c", "font": {"color": "white"}, "id": "attack-pattern--5728f45b-2eca-4942-a7f6-bc4267c1ab8d", "label": "Internal Reconnaisan", "shape": "dot", "title": "{\n  \"type\": \"attack-pattern\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"attack-pattern--5728f45b-2eca-4942-a7f6-bc4267c1ab8d\",\n  \"created\": \"2015-05-15T09:12:16.432Z\",\n  \"modified\": \"2015-05-15T09:12:16.432Z\",\n  \"name\": \"Internal Reconnaisance\",\n  \"description\": \"In the Internal Reconnaissance stage, the intruder collects information about the victim environment. Like most APT (and non-APT) intruders, APT1 primarily uses built-in operating system commands to explore a compromised system and its networked environment. Although they usually simply type these commands into a command shell, sometimes intruders may use batch scripts to speed up the process.\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mandiant-attack-lifecycle-model\",\n      \"phase_name\": \"internal-recon\"\n    }\n  ]\n}"}, {"color": "#ff4b5c", "font": {"color": "white"}, "id": "attack-pattern--0bea2358-c244-4905-a664-a5cdce7bb767", "label": "Lateral Movement", "shape": "dot", "title": "{\n  \"type\": \"attack-pattern\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"attack-pattern--0bea2358-c244-4905-a664-a5cdce7bb767\",\n  \"created\": \"2015-05-15T09:12:16.432Z\",\n  \"modified\": \"2015-05-15T09:12:16.432Z\",\n  \"name\": \"Lateral Movement\",\n  \"description\": \"Once an APT intruder has a foothold inside the network and a set of legitimate credentials, it is simple for the intruder to move around the network undetected. They can connect to shared resources on other systems. They can execute commands on other systems using the publicly available \u0027psexec\u0027 tool from Microsoft Sysinternals or the built-in Windows Task Scheduler (\u0027at.exe\u0027).\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mandiant-attack-lifecycle-model\",\n      \"phase_name\": \"move-laterally\"\n    }\n  ]\n}"}, {"color": "#ff4b5c", "font": {"color": "white"}, "id": "attack-pattern--7151c6d0-7e97-47ce-9290-087315ea3db7", "label": "Maintain Presence", "shape": "dot", "title": "{\n  \"type\": \"attack-pattern\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"attack-pattern--7151c6d0-7e97-47ce-9290-087315ea3db7\",\n  \"created\": \"2015-05-15T09:12:16.432Z\",\n  \"modified\": \"2015-05-15T09:12:16.432Z\",\n  \"name\": \"Maintain Presence\",\n  \"description\": \"In this stage, the intruder takes actions to ensure continued, long-term control over key systems in the network environment from outside of the network. APT1 does this in three ways: Install new backdoors on multiple systems, use legitimate VPN credentials, and log in to web portals.\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mandiant-attack-lifecycle-model\",\n      \"phase_name\": \"maintain-presence\"\n    }\n  ]\n}"}, {"color": "#ff4b5c", "font": {"color": "white"}, "id": "attack-pattern--0781fe70-4c94-4300-8865-4b08b98611b4", "label": "Completing the Missi", "shape": "dot", "title": "{\n  \"type\": \"attack-pattern\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"attack-pattern--0781fe70-4c94-4300-8865-4b08b98611b4\",\n  \"created\": \"2015-05-15T09:12:16.432Z\",\n  \"modified\": \"2015-05-15T09:12:16.432Z\",\n  \"name\": \"Completing the Mission\",\n  \"description\": \"Similar to other APT groups we track, once APT1 finds files of interest they pack them into archive files before stealing them. APT intruders most commonly use the RAR archiving utility for this task and ensure that the archives are password protected. Sometimes APT1 intruders use batch scripts to assist them in the process. After creating files compressed via RAR, the APT1 attackers will transfer files out of the network in ways that are consistent with other APT groups, including using the File Transfer Protocol (FTP) or their existing backdoors. Many times their RAR files are so large that the attacker splits them into chunks before transferring them. Unlike most other APT groups we track, APT1 uses two email-stealing utilities that we believe are unique to APT1. The first, GETMAIL, was designed specifically to extract email messages, attachments, and folders from within Microsoft Outlook archive (\u0027PST\u0027) files. The GETMAIL utility allows APT1 intruders the flexibility to take only the emails between dates of their choice. In one case, we observed an APT1 intruder return to a compromised system once a week for four weeks in a row to steal only the past week\\u2019s emails. Whereas GETMAIL steals email in Outlook archive files, the second utility, MAPIGET, was designed specifically to steal email that has not yet been archived and still resides on a Microsoft Exchange Server. In order to operate successfully, MAPIGET requires username/password combinations that the Exchange server will accept. MAPIGET extracts email from specified accounts into text files (for the email body) and separate attachments, if there are any.\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mandiant-attack-lifecycle-model\",\n      \"phase_name\": \"complete-mission\"\n    }\n  ]\n}"}, {"color": "#aaaaaa", "font": {"color": "white"}, "id": "report--e33ffe07-2f4c-48d8-b0af-ee2619d765cf", "label": "APT1: Exposing One o", "shape": "dot", "title": "{\n  \"type\": \"report\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"report--e33ffe07-2f4c-48d8-b0af-ee2619d765cf\",\n  \"created\": \"2015-05-15T09:12:16.432Z\",\n  \"modified\": \"2015-05-15T09:12:16.432Z\",\n  \"name\": \"APT1: Exposing One of China\u0027s Cyber Espionage Units\",\n  \"report_types\": [\n    \"threat-report\",\n    \"threat-actor\"\n  ],\n  \"published\": \"2013-02-19T00:00:00.000000Z\",\n  \"description\": \"Since 2004, Mandiant has investigated computer security breaches at hundreds of organizations around the world. The majority of these security breaches are attributed to advanced threat actors referred to as the \u0027Advanced Persistent Threat\u0027 (APT). We first published details about the APT in our January 2010 M-Trends report. As we stated in the report, our position was that \u0027The Chinese government may authorize this activity, but theres no way to determine the\\textent of its involvement.\u0027 Now, three years later, we have the evidence required to change our assessment. The details\\twe have analyzed during hundreds of investigations convince us that the groups conducting these activities are based primarily in China and that the Chinese Government is aware of them. Mandiant continues to track dozens of APT groups around the world; however, this report is focused on the most prolific of these groups. We refer to this group as \u0027APT1\u0027 and it is one of more than 20 APT groups with origins in China. APT1 is a single organization of operators that has conducted a cyber espionage campaign against a broad range of victims since at least 2006. From our observations, it is one of the most prolific cyber espionage groups in terms of the sheer quantity of information stolen. The scale and impact of APT1\u0027s operations compelled us to write this report. The activity we have directly observed likely represents only a small fraction of the cyber espionage that APT1 has conducted. Though our visibility of APT1\u0027s activities is incomplete, we have analyzed the group\u0027s intrusions against nearly 150 victims over seven years. From our unique vantage point responding to victims, we tracked APT1 back to four large networks in Shanghai, two of which are allocated directly to the Pudong New Area. We uncovered a substantial amount of APT1\u0027s attack infrastructure, command and control, and modus operandi (tools, tactics, and procedures). In an effort to underscore there are actual individuals behind the keyboard, Mandiant is revealing three personas we have attributed to APT1. These operators, like soldiers, may merely be following orders given to them by others. Our analysis has led us to conclude that APT1 is likely government-sponsored and one of the most persistent of China\u0027s cyber threat actors. We believe that APT1 is able to wage such a long-running and extensive cyber espionage campaign in large part because it receives direct government support. In seeking to identify the organization behind this activity, our research found that People\u0027s Liberation Army (PLA\u0027s) Unit 61398 is similar to APT1 in its mission, capabilities, and resources. PLA Unit 61398 is also located in precisely the same area from which APT1 activity appears to originate.\",\n  \"object_refs\": [\n    \"attack-pattern--3098c57b-d623-4c11-92f4-5905da66658b\",\n    \"attack-pattern--1e2c4237-d469-4144-9c0b-9e5c0c513c49\",\n    \"attack-pattern--e13f3e6d-4f9c-4265-b1cf-f997a1bf7827\",\n    \"attack-pattern--5728f45b-2eca-4942-a7f6-bc4267c1ab8d\",\n    \"attack-pattern--0bea2358-c244-4905-a664-a5cdce7bb767\",\n    \"attack-pattern--7151c6d0-7e97-47ce-9290-087315ea3db7\",\n    \"attack-pattern--0781fe70-4c94-4300-8865-4b08b98611b4\",\n    \"identity--a9119a87-6576-46af-bfd7-4fbe55926671\",\n    \"identity--e88ab115-7768-4630-baa3-3d49a7d946ea\",\n    \"identity--0e9d20d9-fb11-42e3-94bc-b89fb5b007ca\",\n    \"identity--ecf1c7de-d96c-41c6-a510-b9c65cdc9e3b\",\n    \"indicator--031778a4-057f-48e6-9db9-c8d72b81ccd5\",\n    \"indicator--da1d061b-2bc9-467a-b16f-8d14f468e1f0\",\n    \"indicator--2173d108-5714-42fd-8213-4f3790259fda\",\n    \"indicator--8ce03314-dfea-4498-ac9b-136e41ab00e4\",\n    \"indicator--3f3ff9f1-bb4e-4392-89e5-1991179042ba\",\n    \"indicator--8390fd29-24ed-45d4-84d7-c5e5feaf195d\",\n    \"indicator--1002c58e-cbde-4930-b5ee-490037fd4f7e\",\n    \"indicator--8d12f44f-8ac0-4b12-8b4a-3699ca8c9691\",\n    \"indicator--745e1537-b4f3-49da-9f64-df6b1b5df190\",\n    \"indicator--1dbe6ed0-c305-458f-9cce-f83c678f5afd\",\n    \"indicator--b3b6b540-d838-41e2-853b-005056c00008\",\n    \"indicator--b3b7035e-d838-41e2-8d38-005056c00008\",\n    \"intrusion-set--da1065ce-972c-4605-8755-9cd1074e3b5a\",\n    \"malware--2485b844-4efe-4343-84c8-eb33312dd56f\",\n    \"malware--c0217091-9d3d-42a1-8952-ccc12d4ad8d0\",\n    \"malware--0f01c5a3-f516-4450-9381-4dd9f2279411\",\n    \"malware--33159b98-3264-4e10-a968-d67975b6272f\",\n    \"malware--fb490cdb-6760-41eb-a79b-0b930a50c017\",\n    \"malware--ea50ecb7-2cd4-4895-bd08-31cd591ed0ca\",\n    \"threat-actor--6d179234-61fc-40c4-ae86-3d53308d8e65\",\n    \"threat-actor--d84cf283-93be-4ca7-890d-76c63eff3636\",\n    \"threat-actor--02e7c48f-0301-4c23-b3e4-02e5a0114c21\",\n    \"threat-actor--d5b62b58-df7c-46b1-a435-4d01945fe21d\",\n    \"threat-actor--94624865-2709-443f-9b4c-2891985fd69b\",\n    \"tool--ce45f721-af14-4fc0-938c-000c16186418\",\n    \"tool--e9778c42-bc2f-4eda-9fb4-6a931834f68c\",\n    \"tool--1cf6a3b8-be43-4c1a-b042-546a890c31b2\",\n    \"tool--4d82bd3e-24a3-4f9d-b8f3-b57267fe06a9\",\n    \"tool--7de5dfcc-6809-4772-9f11-cf26c2be53aa\",\n    \"tool--266b12f2-aa16-4607-809e-f2d33eebb52e\",\n    \"tool--4215b0e5-928e-4b2a-9b5f-64819f287f48\",\n    \"tool--a6dd62d0-9683-48bf-a9cd-61e7eceae57e\",\n    \"tool--806a8f83-4913-4216-bb19-02b48ae25da5\",\n    \"tool--98fd8dc1-6cc7-4908-899f-07473f55149a\",\n    \"relationship--6598bf44-1
