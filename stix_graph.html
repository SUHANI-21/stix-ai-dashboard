              function drawGraph() {

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#cccccc", "font": {"color": "black"}, "id": "identity--c2e554c8-827c-3026-b5a9-b2ed4c3794e0", "label": "AhnLab SEcurity inte", "shape": "dot", "title": "{\n  \"type\": \"identity\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"identity--c2e554c8-827c-3026-b5a9-b2ed4c3794e0\",\n  \"created\": \"2026-01-17T20:51:24.989715Z\",\n  \"modified\": \"2026-01-17T20:51:24.989715Z\",\n  \"name\": \"AhnLab SEcurity intelligence Center (ASEC)\",\n  \"description\": \"AhnLab SEcurity intelligence Center (ASEC) is the publisher of this threat intelligence report. STIXed by TI Mindmap HUB.\",\n  \"identity_class\": \"organization\"\n}"}, {"color": "#cccccc", "font": {"color": "black"}, "id": "identity--fbd192cb-0ab2-33e3-92cc-c2456bf8d439", "label": "TI Mindmap HUB", "shape": "dot", "title": "{\n  \"type\": \"identity\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"identity--fbd192cb-0ab2-33e3-92cc-c2456bf8d439\",\n  \"created\": \"2026-01-17T20:51:24.989715Z\",\n  \"modified\": \"2026-01-17T20:51:24.989715Z\",\n  \"name\": \"TI Mindmap HUB\",\n  \"description\": \"TI Mindmap HUB is an AI-powered threat intelligence platform that generates STIX bundles from OSINT sources.\",\n  \"identity_class\": \"organization\"\n}"}, {"color": "#cccccc", "font": {"color": "black"}, "id": "marking-definition--94868c89-83c2-464b-929b-a1a8aa3c8487", "label": "TLP:CLEAR", "shape": "dot", "title": "{\n  \"type\": \"marking-definition\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"marking-definition--94868c89-83c2-464b-929b-a1a8aa3c8487\",\n  \"created\": \"2026-01-17T20:51:24.989715Z\",\n  \"definition_type\": \"tlp\",\n  \"name\": \"TLP:CLEAR\",\n  \"definition\": {\n    \"tlp\": \"clear\"\n  }\n}"}, {"color": "#ff4b5c", "font": {"color": "black"}, "id": "attack-pattern--c3179ce8-b703-d23e-e235-0ae798fa0d3a", "label": "Brute Force and Cred", "shape": "dot", "title": "{\n  \"type\": \"attack-pattern\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"attack-pattern--c3179ce8-b703-d23e-e235-0ae798fa0d3a\",\n  \"created\": \"2026-01-17T20:51:47.970279Z\",\n  \"modified\": \"2026-01-17T20:51:47.970279Z\",\n  \"created_by_ref\": \"identity--c2e554c8-827c-3026-b5a9-b2ed4c3794e0\",\n  \"name\": \"Brute Force and Credential Stuffing on MS-SQL Servers\",\n  \"description\": \"Trigona and other threat actors target externally exposed MS-SQL servers with weak or default credentials. The attackers employ brute force and dictionary attacks to gain unauthorized access to these servers. Once login is successful, they proceed to execute further malicious activities. The campaign specifically exploits the fact that many database servers are configured with simple or guessable passwords, making them highly susceptible to automated credential attacks. This initial access vector is a recurring theme in the observed incidents, with attackers leveraging automated tools to rapidly test large numbers of username and password combinations until access is achieved.\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mitre-attack\",\n      \"phase_name\": \"initial-access\"\n    }\n  ],\n  \"external_references\": [\n    {\n      \"source_name\": \"mitre-attack\",\n      \"url\": \"https://attack.mitre.org/techniques/T1110/001/\",\n      \"external_id\": \"T1110.001\"\n    }\n  ]\n}"}, {"color": "#ff4b5c", "font": {"color": "black"}, "id": "attack-pattern--3d58c97e-d8e3-46a3-b716-949415be5bfd", "label": "CLR Shell Execution ", "shape": "dot", "title": "{\n  \"type\": \"attack-pattern\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"attack-pattern--3d58c97e-d8e3-46a3-b716-949415be5bfd\",\n  \"created\": \"2026-01-17T20:51:47.970375Z\",\n  \"modified\": \"2026-01-17T20:51:47.970375Z\",\n  \"created_by_ref\": \"identity--c2e554c8-827c-3026-b5a9-b2ed4c3794e0\",\n  \"name\": \"CLR Shell Execution for Payload Deployment\",\n  \"description\": \"After gaining access to the MS-SQL server, attackers utilize the CLR Shell technique to execute arbitrary commands and deploy additional payloads. The CLR Shell leverages SQL Server\\u2019s ability to run .NET code, allowing the attacker to execute system-level commands directly from the database context. This method is used to install further malware, such as backdoors, privilege escalation tools, and remote access utilities. The attackers\\u2019 consistent use of CLR Shell highlights their preference for leveraging built-in server functionalities to maintain stealth and flexibility in their operations.\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mitre-attack\",\n      \"phase_name\": \"execution\"\n    }\n  ],\n  \"external_references\": [\n    {\n      \"source_name\": \"mitre-attack\",\n      \"url\": \"https://attack.mitre.org/techniques/T1505/002/\",\n      \"external_id\": \"T1505.002\"\n    }\n  ]\n}"}, {"color": "#ff4b5c", "font": {"color": "black"}, "id": "attack-pattern--1b133d58-4f79-e08c-0006-ba87786f54cc", "label": "Abuse of BCP Utility", "shape": "dot", "title": "{\n  \"type\": \"attack-pattern\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"attack-pattern--1b133d58-4f79-e08c-0006-ba87786f54cc\",\n  \"created\": \"2026-01-17T20:51:47.970472Z\",\n  \"modified\": \"2026-01-17T20:51:47.970472Z\",\n  \"created_by_ref\": \"identity--c2e554c8-827c-3026-b5a9-b2ed4c3794e0\",\n  \"name\": \"Abuse of BCP Utility for Local File Creation from Database\",\n  \"description\": \"Attackers exploit the Bulk Copy Program (BCP) utility (bcp.exe) to export malicious binaries stored in SQL tables to the local filesystem. They first inject or store the malware payloads as binary objects in a database table (e.g., \u0027uGnzBdZbsi\u0027), then use BCP commands to write these binaries to disk, specifying format files (e.g., \u0027FODsOZKgAU.txt\u0027) for proper extraction. This technique allows the attacker to bypass traditional network-based delivery mechanisms and leverage legitimate administrative tools to stage malware directly on the compromised server, reducing the likelihood of detection by network security controls.\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mitre-attack\",\n      \"phase_name\": \"execution\"\n    }\n  ]\n}"}, {"color": "#ff4b5c", "font": {"color": "black"}, "id": "attack-pattern--182cb842-ff8b-a8d7-aa43-448981d9c4f7", "label": "Malware Download via", "shape": "dot", "title": "{\n  \"type\": \"attack-pattern\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"attack-pattern--182cb842-ff8b-a8d7-aa43-448981d9c4f7\",\n  \"created\": \"2026-01-17T20:51:47.970524Z\",\n  \"modified\": \"2026-01-17T20:51:47.970524Z\",\n  \"created_by_ref\": \"identity--c2e554c8-827c-3026-b5a9-b2ed4c3794e0\",\n  \"name\": \"Malware Download via Curl, Bitsadmin, and PowerShell\",\n  \"description\": \"Following initial compromise, attackers use various legitimate command-line utilities\\u2014such as Curl, Bitsadmin, and PowerShell\\u2014to download additional malicious payloads from remote servers. These tools are invoked with specific URLs pointing to attacker-controlled infrastructure, and the downloaded files are saved to locations on the infected system. This approach enables flexible and reliable delivery of malware components, including backdoors, miners, and remote access tools, while blending in with normal administrative activity and evading some endpoint protections.\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mitre-attack\",\n      \"phase_name\": \"execution\"\n    }\n  ],\n  \"external_references\": [\n    {\n      \"source_name\": \"mitre-attack\",\n      \"url\": \"https://attack.mitre.org/techniques/T1105/\",\n      \"external_id\": \"T1105\"\n    }\n  ]\n}"}, {"color": "#ff4b5c", "font": {"color": "black"}, "id": "attack-pattern--1d74e0bd-50d8-89e8-14a9-2cfac7644e3d", "label": "Installation and Abu", "shape": "dot", "title": "{\n  \"type\": \"attack-pattern\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"attack-pattern--1d74e0bd-50d8-89e8-14a9-2cfac7644e3d\",\n  \"created\": \"2026-01-17T20:51:47.970577Z\",\n  \"modified\": \"2026-01-17T20:51:47.970577Z\",\n  \"created_by_ref\": \"identity--c2e554c8-827c-3026-b5a9-b2ed4c3794e0\",\n  \"name\": \"Installation and Abuse of Legitimate Remote Access Tools (AnyDesk, RustDesk, Teramind)\",\n  \"description\": \"Attackers install legitimate remote access software such as AnyDesk, RustDesk, and Teramind on compromised servers to establish persistent, interactive control. These tools are deployed via silent installation commands and batch scripts, often placed in system directories. By using widely recognized remote management software, attackers can maintain access even if other malware components are detected and removed. The campaign also involves modifying registry keys to facilitate remote logon and creating new user accounts specifically for remote access, further entrenching their foothold.\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mitre-attack\",\n      \"phase_name\": \"persistence\"\n    }\n  ],\n  \"external_references\": [\n    {\n      \"source_name\": \"mitre-attack\",\n      \"url\": \"https://attack.mitre.org/techniques/T1219/\",\n      \"external_id\": \"T1219\"\n    }\n  ]\n}"}, {"color": "#ff4b5c", "font": {"color": "black"}, "id": "attack-pattern--4ad80e6b-7119-947c-a7df-86a53ec04113", "label": "Creation of New Loca", "shape": "dot", "title": "{\n  \"type\": \"attack-pattern\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"attack-pattern--4ad80e6b-7119-947c-a7df-86a53ec04113\",\n  \"created\": \"2026-01-17T20:51:47.970628Z\",\n  \"modified\": \"2026-01-17T20:51:47.970628Z\",\n  \"created_by_ref\": \"identity--c2e554c8-827c-3026-b5a9-b2ed4c3794e0\",\n  \"name\": \"Creation of New Local Users for RDP Access\",\n  \"description\": \"Custom batch scripts are used to create new local user accounts (e.g., \u0027Remote99\u0027, \u0027Ladmin\u0027, \u0027erp2\u0027) with permissions to access the system via Remote Desktop Protocol (RDP). These scripts also modify system settings and registry keys to enable credential logon and facilitate remote access. By establishing new privileged accounts, attackers ensure continued access and control, even if the original compromised account is disabled or removed. This technique is a key aspect of the persistence and privilege escalation strategy observed in the campaign.\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mitre-attack\",\n      \"phase_name\": \"persistence\"\n    }\n  ],\n  \"external_references\": [\n    {\n      \"source_name\": \"mitre-attack\",\n      \"url\": \"https://attack.mitre.org/techniques/T1136/001/\",\n      \"external_id\": \"T1136.001\"\n    }\n  ]\n}"}, {"color": "#ff4b5c", "font": {"color": "black"}, "id": "attack-pattern--507c5097-afe2-ccc0-e3f3-9421f6f3646d", "label": "Deployment of Rust-b", "shape": "dot", "title": "{\n  \"type\": \"attack-pattern\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"attack-pattern--507c5097-afe2-ccc0-e3f3-9421f6f3646d\",\n  \"created\": \"2026-01-17T20:51:47.970683Z\",\n  \"modified\": \"2026-01-17T20:51:47.970683Z\",\n  \"created_by_ref\": \"identity--c2e554c8-827c-3026-b5a9-b2ed4c3794e0\",\n  \"name\": \"Deployment of Rust-based Scanner Malware for Network Reconnaissance\",\n  \"description\": \"Attackers deploy custom Rust-based scanner malware on infected servers to collect system information and scan for additional targets. The malware gathers IP and geolocation data via \u0027ip-api.com\u0027 and reports this information to a C\u0026C server. It then performs targeted scans for RDP and MS-SQL services within the network, enabling lateral movement and identification of further vulnerable systems. The use of custom-built scanners demonstrates a tailored approach to internal reconnaissance and expansion within compromised environments.\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mitre-attack\",\n      \"phase_name\": \"discovery\"\n    }\n  ],\n  \"external_references\": [\n    {\n      \"source_name\": \"mitre-attack\",\n      \"url\": \"https://attack.mitre.org/techniques/T1046/\",\n      \"external_id\": \"T1046\"\n    }\n  ]\n}"}, {"color": "#ff4b5c", "font": {"color": "black"}, "id": "attack-pattern--c78bd3f3-4ff8-25bd-465c-9b60ec9be72f", "label": "Installation of Prox", "shape": "dot", "title": "{\n  \"type\": \"attack-pattern\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"attack-pattern--c78bd3f3-4ff8-25bd-465c-9b60ec9be72f\",\n  \"created\": \"2026-01-17T20:51:47.970785Z\",\n  \"modified\": \"2026-01-17T20:51:47.970785Z\",\n  \"created_by_ref\": \"identity--c2e554c8-827c-3026-b5a9-b2ed4c3794e0\",\n  \"name\": \"Installation of Proxyware and CoinMiner for Resource Monetization\",\n  \"description\": \"Beyond traditional data theft and ransomware, attackers install proxyware and cryptocurrency mining software on compromised servers. Proxyware leverages the server\\u2019s available internet bandwidth to generate revenue by sharing it with external parties, while CoinMiner exploits CPU resources to mine cryptocurrency. These monetization techniques are deployed alongside other malware, maximizing the financial gain from each compromised asset and often running covertly in the background to avoid detection.\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mitre-attack\",\n      \"phase_name\": \"impact\"\n    }\n  ],\n  \"external_references\": [\n    {\n      \"source_name\": \"mitre-attack\",\n      \"url\": \"https://attack.mitre.org/techniques/T1496/\",\n      \"external_id\": \"T1496\"\n    }\n  ]\n}"}, {"color": "#ff4b5c", "font": {"color": "black"}, "id": "attack-pattern--2a9aa73f-8dab-b578-9757-8d1a7310d4f7", "label": "Use of Custom Stress", "shape": "dot", "title": "{\n  \"type\": \"attack-pattern\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"attack-pattern--2a9aa73f-8dab-b578-9757-8d1a7310d4f7\",\n  \"created\": \"2026-01-17T20:51:47.970872Z\",\n  \"modified\": \"2026-01-17T20:51:47.970872Z\",\n  \"created_by_ref\": \"identity--c2e554c8-827c-3026-b5a9-b2ed4c3794e0\",\n  \"name\": \"Use of Custom StressTester for Service Availability and SQL Injection Testing\",\n  \"description\": \"Attackers utilize a custom-built tool named StressTester, written in Go, to assess the performance and vulnerability of targeted services. The tool is capable of sending GET and POST requests, as well as executing SQL injection attempts against MS-SQL servers. This allows attackers to test the robustness of services, identify exploitable injection points, and potentially disrupt normal operations. The deployment of StressTester prior to launching brute force or injection attacks indicates a deliberate, reconnaissance-driven approach to exploitation.\",\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mitre-attack\",\n      \"phase_name\": \"discovery\"\n    }\n  ]\n}"}, {"color": "#ff9f43", "font": {"color": "black"}, "id": "malware--ce06ca58-a8b1-227a-3fad-65480f80b30c", "label": "CLR Shell", "shape": "dot", "title": "{\n  \"type\": \"malware\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"malware--ce06ca58-a8b1-227a-3fad-65480f80b30c\",\n  \"created\": \"2026-01-17T20:52:11.614672Z\",\n  \"modified\": \"2026-01-17T20:52:11.614672Z\",\n  \"created_by_ref\": \"identity--c2e554c8-827c-3026-b5a9-b2ed4c3794e0\",\n  \"name\": \"CLR Shell\",\n  \"description\": \"CLR Shell is used by attackers to execute arbitrary commands on compromised MS-SQL servers, enabling further payload delivery and system control.\",\n  \"malware_types\": [\n    \"backdoor\",\n    \"trojan\"\n  ],\n  \"is_family\": true,\n  \"aliases\": [\n    \"CLRShell\"\n  ],\n  \"x_capabilities\": [\n    \"remote-access\",\n    \"command-and-control\",\n    \"lateral-movement\"\n  ]\n}"}, {"color": "#ff9f43", "font": {"color": "black"}, "id": "malware--8ee20279-8391-5ec7-8acc-45027d874316", "label": "Potato", "shape": "dot", "title": "{\n  \"type\": \"malware\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"malware--8ee20279-8391-5ec7-8acc-45027d874316\",\n  \"created\": \"2026-01-17T20:52:11.614794Z\",\n  \"modified\": \"2026-01-17T20:52:11.614794Z\",\n  \"created_by_ref\": \"identity--c2e554c8-827c-3026-b5a9-b2ed4c3794e0\",\n  \"name\": \"Potato\",\n  \"description\": \"Potato-type malware is used for privilege escalation on Windows systems, allowing attackers to gain higher-level access after initial compromise.\",\n  \"malware_types\": [\n    \"privilege-escalation\",\n    \"trojan\"\n  ],\n  \"is_family\": true,\n  \"aliases\": [\n    \"Juicy Potato\",\n    \"Rotten Potato\"\n  ],\n  \"x_capabilities\": [\n    \"privilege-escalation\",\n    \"persistence\"\n  ]\n}"}, {"color": "#ff9f43", "font": {"color": "black"}, "id": "malware--9a34bbdf-cba5-4f1c-d9ca-cfac9978bf65", "label": "CoinMiner", "shape": "dot", "title": "{\n  \"type\": \"malware\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"malware--9a34bbdf-cba5-4f1c-d9ca-cfac9978bf65\",\n  \"created\": \"2026-01-17T20:52:11.614851Z\",\n  \"modified\": \"2026-01-17T20:52:11.614851Z\",\n  \"created_by_ref\": \"identity--c2e554c8-827c-3026-b5a9-b2ed4c3794e0\",\n  \"name\": \"CoinMiner\",\n  \"description\": \"CoinMiner is deployed to hijack system resources for unauthorized cryptocurrency mining, exploiting compromised servers for financial gain.\",\n  \"malware_types\": [\n    \"trojan\"\n  ],\n  \"is_family\": true,\n  \"aliases\": [\n    \"Cryptominer\"\n  ],\n  \"x_capabilities\": [\n    \"resource-hijacking\",\n    \"persistence\"\n  ]\n}"}, {"color": "#ff9f43", "font": {"color": "black"}, "id": "malware--6d7e76f7-4c18-e535-67a4-48e11ebb2498", "label": "Proxyware", "shape": "dot", "title": "{\n  \"type\": \"malware\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"malware--6d7e76f7-4c18-e535-67a4-48e11ebb2498\",\n  \"created\": \"2026-01-17T20:52:11.614902Z\",\n  \"modified\": \"2026-01-17T20:52:11.614902Z\",\n  \"created_by_ref\": \"identity--c2e554c8-827c-3026-b5a9-b2ed4c3794e0\",\n  \"name\": \"Proxyware\",\n  \"description\": \"Proxyware is used to monetize compromised servers by sharing their internet bandwidth with external parties, often without the owner\u0027s consent.\",\n  \"malware_types\": [\n    \"trojan\",\n    \"adware\"\n  ],\n  \"is_family\": true,\n  \"x_capabilities\": [\n    \"resource-hijacking\",\n    \"data-exfiltration\"\n  ]\n}"}, {"color": "#ff9f43", "font": {"color": "black"}, "id": "malware--4d1f1382-6a78-92b1-e655-da01495302a0", "label": "Gh0st RAT", "shape": "dot", "title": "{\n  \"type\": \"malware\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"malware--4d1f1382-6a78-92b1-e655-da01495302a0\",\n  \"created\": \"2026-01-17T20:52:11.614950Z\",\n  \"modified\": \"2026-01-17T20:52:11.614950Z\",\n  \"created_by_ref\": \"identity--c2e554c8-827c-3026-b5a9-b2ed4c3794e0\",\n  \"name\": \"Gh0st RAT\",\n  \"description\": \"Gh0st RAT is installed to provide attackers with persistent remote access and control over infected systems, enabling data theft and further exploitation.\",\n  \"malware_types\": [\n    \"remote-access-trojan\",\n    \"backdoor\"\n  ],\n  \"is_family\": true,\n  \"aliases\": [\n    \"Gh0stRAT\"\n  ],\n  \"x_capabilities\": [\n    \"remote-access\",\n    \"command-and-control\",\n    \"data-exfiltration\"\n  ]\n}"}, {"color": "#ff9f43", "font": {"color": "black"}, "id": "malware--d10440fb-0e62-3537-56f5-aa7e3d3d443f", "label": "Cobalt Strike", "shape": "dot", "title": "{\n  \"type\": \"malware\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"malware--d10440fb-0e62-3537-56f5-aa7e3d3d443f\",\n  \"created\": \"2026-01-17T20:52:11.614997Z\",\n  \"modified\": \"2026-01-17T20:52:11.614997Z\",\n  \"created_by_ref\": \"identity--c2e554c8-827c-3026-b5a9-b2ed4c3794e0\",\n  \"name\": \"Cobalt Strike\",\n  \"description\": \"Cobalt Strike is a penetration testing tool frequently abused by attackers to establish command-and-control channels and facilitate lateral movement within networks.\",\n  \"malware_types\": [\n    \"backdoor\",\n    \"remote-access-trojan\"\n  ],\n  \"is_family\": true,\n  \"x_capabilities\": [\n    \"command-and-control\",\n    \"lateral-movement\",\n    \"remote-access\"\n  ]\n}"}, {"color": "#ff9f43", "font": {"color": "black"}, "id": "malware--2b0ea882-cf9c-918a-9610-d71354fe5166", "label": "Meterpreter", "shape": "dot", "title": "{\n  \"type\": \"malware\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"malware--2b0ea882-cf9c-918a-9610-d71354fe5166\",\n  \"created\": \"2026-01-17T20:52:11.615056Z\",\n  \"modified\": \"2026-01-17T20:52:11.615056Z\",\n  \"created_by_ref\": \"identity--c2e554c8-827c-3026-b5a9-b2ed4c3794e0\",\n  \"name\": \"Meterpreter\",\n  \"description\": \"Meterpreter is a payload used for remote access and post-exploitation, allowing attackers to control compromised systems and execute further malicious actions.\",\n  \"malware_types\": [\n    \"backdoor\",\n    \"remote-access-trojan\"\n  ],\n  \"is_family\": true,\n  \"x_capabilities\": [\n    \"remote-access\",\n    \"command-and-control\",\n    \"lateral-movement\"\n  ]\n}"}, {"color": "#ff9f43", "font": {"color": "black"}, "id": "malware--91cab5f4-544b-ad15-1b29-b7a4c0117368", "label": "Trigona", "shape": "dot", "title": "{\n  \"type\": \"malware\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"malware--91cab5f4-544b-ad15-1b29-b7a4c0117368\",\n  \"created\": \"2026-01-17T20:52:11.615105Z\",\n  \"modified\": \"2026-01-17T20:52:11.615105Z\",\n  \"created_by_ref\": \"identity--c2e554c8-827c-3026-b5a9-b2ed4c3794e0\",\n  \"name\": \"Trigona\",\n  \"description\": \"Trigona ransomware targets exposed MS-SQL servers, encrypting files and demanding ransom payments from victims after gaining access via brute force or credential attacks.\",\n  \"malware_types\": [\n    \"ransomware\"\n  ],\n  \"is_family\": true,\n  \"x_capabilities\": [\n    \"encryption\",\n    \"data-exfiltration\",\n    \"persistence\"\n  ]\n}"}, {"color": "#ff9f43", "font": {"color": "black"}, "id": "malware--078e9bc0-8552-0b5a-7e45-7bb0763e6a67", 3026-b5a9-b2ed4c3794e0\",\n  \"name\": \"Rust-based Scanner\",\n  \"description\": \"A custom Rust-based scanner is deployed to enumerate and brute-force RDP and MS-SQL services, collecting system and geolocation data for further exploitation.\",\n  \"malware_types\": [\n    \"scanner\",\n    \"trojan\"\n  ],\n  \"is_family\": true,\n  \"x_capabilities\": [\n    \"data-exfiltration\",\n    \"credential-theft\",\n    \"lateral-movement\"\n  ]\n}"}, {"color": "#ff9f43", "font": {"color": "black"}, "id": "malware--77905037-613d-72b0-2fd2-70e72bfa8b56", "label": "StressTester", "shape": "dot", "title": "{\n  \"type\": \"malware\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"malware--77905037-613d-72b0-2fd2-70e72bfa8b56\",\n  \"created\": \"2026-01-17T20:52:11.615297Z\",\n  \"modified\": \"2026-01-17T20:52:11.615297Z\",\n  \"created_by_ref\": \"identity--c2e554c8-827c-3026-b5a9-b2ed4c3794e0\",\n  \"name\": \"StressTester\",\n  \"description\": \"StressTester, written in Go, is used to test internet speed and perform SQL injection requests, aiding attackers in identifying vulnerable systems and services.\",\n  \"malware_types\": [\n    \"scanner\",\n    \"trojan\"\n  ],\n  \"is_family\": true,\n  \"x_capabilities\": [\n    \"data-exfiltration\",\n    \"lateral-movement\"\n  ]\n}"}, {"color": "#cccccc", "font": {"color": "black"}, "id": "threat-actor--91cab5f4-544b-ad15-1b29-b7a4c0117368", "label": "Trigona", "shape": "dot", "title": "{\n  \"type\": \"threat-actor\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"threat-actor--91cab5f4-544b-ad15-1b29-b7a4c0117368\",\n  \"created\": \"2026-01-17T20:52:15.635085Z\",\n  \"modified\": \"2026-01-17T20:52:15.635085Z\",\n  \"created_by_ref\": \"identity--c2e554c8-827c-3026-b5a9-b2ed4c3794e0\",\n  \"name\": \"Trigona\",\n  \"description\": \"Trigona is a ransomware threat actor attributed in the article as actively targeting exposed MS-SQL servers with weak credentials. The group uses a combination of custom malware, remote management tools, and brute-force techniques to gain access, deploy ransomware, and maintain persistence.\",\n  \"threat_actor_types\": [\n    \"criminal\"\n  ],\n  \"goals\": [\n    \"Compromise MS-SQL servers\",\n    \"Deploy ransomware\",\n    \"Establish remote access via tools like AnyDesk and Teramind\",\n    \"Create persistent access accounts\",\n    \"Exfiltrate or monetize system resources\"\n  ],\n  \"sophistication\": \"advanced\",\n  \"primary_motivation\": \"financial\"\n}"}, {"color": "#1dd1a1", "font": {"color": "black"}, "id": "tool--d10440fb-0e62-3537-56f5-aa7e3d3d443f", "label": "Cobalt Strike", "shape": "dot", "title": "{\n  \"type\": \"tool\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"tool--d10440fb-0e62-3537-56f5-aa7e3d3d443f\",\n  \"created\": \"2026-01-17T20:52:28.591162Z\",\n  \"modified\": \"2026-01-17T20:52:28.591162Z\",\n  \"created_by_ref\": \"identity--c2e554c8-827c-3026-b5a9-b2ed4c3794e0\",\n  \"name\": \"Cobalt Strike\",\n  \"description\": \"Used to deploy backdoors on compromised MS-SQL servers, enabling attackers to gain remote control and execute commands post-exploitation.\",\n  \"tool_types\": [\n    \"remote-access\",\n    \"exploitation\",\n    \"command-and-control\"\n  ],\n  \"kill_chain_phases\": [\n    {\n      \"kill_chain_name\": \"mitre-attack\",\n      \"phase_name\": \"command-and-control\"\n    }\n  ]\n}"}, {"color": "#1dd1a1", "font": {"color": "black"}, "id": "tool--2b0ea882-cf9c-918a-9610-d71354fe5166", "label": "Meterpreter", "shape": "dot", "title": "{\n  \"type\": \"tool\",\n  \"spec_version\": \"2.1\",\n  \"id\": \"tool--2b0ea882-cf9c-918a-9610-d71354fe5166\",\n  \"created\": \"2026-01-17T20:52:28.591250Z\",\n  \"modified\": \"2026-01-17T20:52:28.591250Z\",\n  \"created_by_ref\": \"identity--c2e554c8-827c-3026-b5a9-b2ed4c3794e0\",\n  \"name\": \"Meterpreter\",\n  \"description\": \"Installed as a backdoor to provide attackers with interactive control over infected servers, allowing further exploitation and lateral movem
